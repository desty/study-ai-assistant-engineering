site_name: AI Assistant Engineering
site_description: LLM · RAG · Agent · 파인튜닝을 책처럼 읽고 실습으로 완성하는 가이드
site_author: desty
site_url: https://desty.github.io/study-ai-assistant-engineering/
repo_url: https://github.com/desty/study-ai-assistant-engineering
repo_name: desty/study-ai-assistant-engineering

theme:
  name: material
  language: ko
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: 다크 모드
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - navigation.indexes
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.tooltips
  icon:
    repo: fontawesome/brands/github
  font:
    text: Pretendard
    code: JetBrains Mono

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - pymdownx.keys
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - 홈: index.md
  - 소개:
      - 학습 시스템: about/system.md
      - 학습 내용: about/curriculum.md
  - Part 1. 입문:
      - 왜 모델이 필요한가: part1/01-why-model.md
      - LLM이란 무엇인가: part1/02-what-is-llm.md
      - AI Assistant 시스템 개요: part1/03-assistant-overview.md
  - Part 2. Python & API:
      - API 시작: part2/04-api-start.md
      - 프롬프트 + CoT: part2/05-prompt-cot.md
      - 구조화 출력: part2/06-structured-output.md
      - 스트리밍과 UX: part2/07-streaming-ux.md
      - Tool Calling: part2/08-tool-calling.md
  - Part 3. RAG:
      - 왜 RAG인가: part3/09-why-rag.md
      - 임베딩·벡터검색: part3/10-embedding.md
      - RAG 파이프라인: part3/11-pipeline.md
      - 검색 품질 개선: part3/12-retrieval-quality.md
      - Advanced RAG: part3/13-advanced-rag.md
      - LangChain + 멀티모달: part3/14-langchain-multimodal.md
  - Part 4. 평가·추론:
      - 무엇을 평가하나: part4/15-what-to-evaluate.md
      - 평가셋 만들기: part4/16-evalset.md
      - LLM-as-a-Judge: part4/17-llm-as-judge.md
      - 추론 품질: part4/18-reasoning-quality.md
      - 실패 분석: part4/19-failure-analysis.md
  - Part 5. Agent & LangGraph:
      - Agent란: part5/20-what-is-agent.md
      - Agent 패턴: part5/21-agent-patterns.md
      - Tool Use 실전: part5/22-tool-use.md
      - LangGraph: part5/23-langgraph.md
      - Agent 메모리: part5/24-agent-memory.md
      - 멀티 에이전트: part5/25-multi-agent.md
  - Part 6. 운영:
      - Production 아키텍처: part6/26-prod-arch.md
      - 관측성: part6/27-observability.md
      - 가드레일 7종: part6/28-guardrails.md
      - 휴먼 개입: part6/29-human-in-loop.md
      - 비용·지연 최적화: part6/30-cost-latency.md
  - Part 7. 모델·파인튜닝:
      - 모델 아키텍처: part7/31-model-arch.md
      - 언제 파인튜닝: part7/32-when-to-finetune.md
      - LoRA/QLoRA: part7/33-lora-qlora.md
      - 소형모델·증류: part7/34-small-model-distill.md
  - 캡스톤:
      - Self-Improving Assistant: capstone/self-improving.md
