  <text x="560.0" y="389" text-anchor="middle" font-size="12" fill="#cbd5e1">권장 최소 규모: QA 30건 · 요약 30건 · 분류 100건 (Ch 15 예고). hold-out 20~30%는 별도 보관.</text>
