<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1200" height="480" fill="#020617"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">QLoRA 학습 파이프라인 — 5 단계</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">Colab T4 (16GB) 한 장으로 8B 모델 SFT. 4-bit 로 메모리 압축 → LoRA 만 학습.</text>
  <rect x="114" y="130" width="180" height="120" rx="10" fill="#0f172a"/>
  <rect x="114" y="130" width="180" height="120" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="204.0" y="186.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">① Data</text>
  <text x="204.0" y="202.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">jsonl (q,a)</text>
  <text x="204.0" y="218.0" text-anchor="middle" font-size="10" fill="#60a5fa">apply_chat_template</text>
  <rect x="312" y="130" width="180" height="120" rx="10" fill="#0f172a"/>
  <rect x="312" y="130" width="180" height="120" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="402.0" y="186.0" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">② Base + 4bit</text>
  <text x="402.0" y="202.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">bnb 4bit · NF4</text>
  <text x="402.0" y="218.0" text-anchor="middle" font-size="10" fill="#a78bfa">load_in_4bit=True</text>
  <rect x="510" y="130" width="180" height="120" rx="10" fill="#0f172a"/>
  <rect x="510" y="130" width="180" height="120" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="600.0" y="186.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">③ LoRA 부착</text>
  <text x="600.0" y="202.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">PeftModel</text>
  <text x="600.0" y="218.0" text-anchor="middle" font-size="10" fill="#34d399">r=16, alpha=32</text>
  <rect x="708" y="130" width="180" height="120" rx="10" fill="#0f172a"/>
  <rect x="708" y="130" width="180" height="120" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="798.0" y="186.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fed7aa">④ Trainer</text>
  <text x="798.0" y="202.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">SFTTrainer</text>
  <text x="798.0" y="218.0" text-anchor="middle" font-size="10" fill="#fb923c">epochs=3 · lr=2e-4</text>
  <rect x="906" y="130" width="180" height="120" rx="10" fill="#0f172a"/>
  <rect x="906" y="130" width="180" height="120" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="996.0" y="186.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">⑤ Adapter 저장</text>
  <text x="996.0" y="202.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">save_pretrained</text>
  <text x="996.0" y="218.0" text-anchor="middle" font-size="10" fill="#34d399">~50MB · merge 가능</text>
  <path d="M 296,190.0 L 310,190.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 494,190.0 L 508,190.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 692,190.0 L 706,190.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 890,190.0 L 904,190.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="114" y="310" width="972" height="36" rx="8" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <rect x="114" y="310" width="534.6" height="36" rx="8" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1"/>
  <text x="381.3" y="326" text-anchor="middle" font-size="11" font-weight="700" fill="#ddd6fe">Base 4-bit</text>
  <text x="381.3" y="340" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a78bfa">55%</text>
  <rect x="648.6" y="310" width="48.6" height="36" rx="8" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1"/>
  <text x="672.9" y="326" text-anchor="middle" font-size="11" font-weight="700" fill="#a7f3d0">LoRA</text>
  <text x="672.9" y="340" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#34d399">5%</text>
  <rect x="697.2" y="310" width="194.4" height="36" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1"/>
  <text x="794.4000000000001" y="326" text-anchor="middle" font-size="11" font-weight="700" fill="#fde68a">Activations</text>
  <text x="794.4000000000001" y="340" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">20%</text>
  <rect x="891.6" y="310" width="97.2" height="36" rx="8" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1"/>
  <text x="940.2" y="326" text-anchor="middle" font-size="11" font-weight="700" fill="#fed7aa">Optimizer</text>
  <text x="940.2" y="340" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fb923c">10%</text>
  <text x="1037.4" y="332" text-anchor="middle" font-size="11" fill="#cbd5e1">Headroom 10%</text>
  <text x="114" y="300" font-size="11" font-weight="700" fill="#f1f5f9" font-family="JetBrains Mono, monospace">VRAM 분배 (T4 16GB · 8B 모델 QLoRA)</text>
  <rect x="40" y="445" width="1120" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="600.0" y="461" text-anchor="middle" font-size="11" fill="#cbd5e1">베이스가 메모리 절반. activation 이 둘째. LoRA 자체는 거의 0. seq_len · batch 줄여 activation 압축.</text>
</svg>