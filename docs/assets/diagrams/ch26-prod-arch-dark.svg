<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1200" height="640" fill="#020617"/>
  <rect width="1200" height="640" fill="url(#grid)"/>
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Production 아키텍처 — PoC 와의 차이는 "분리"</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">API · LLM · Retrieval · Session · Observability 다섯 레이어가 각자 실패하고 각자 회복한다.</text>
  <rect x="525" y="90" width="150" height="70" rx="10" fill="#0f172a"/>
  <rect x="525" y="90" width="150" height="70" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="600.0" y="121.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">Client</text>
  <text x="600.0" y="137.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">Web · Mobile · API</text>
  <rect x="480" y="200" width="240" height="70" rx="10" fill="#0f172a"/>
  <rect x="480" y="200" width="240" height="70" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="600.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">API Gateway (FastAPI)</text>
  <text x="600.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">auth · rate limit · async</text>
  <text x="600.0" y="263.0" text-anchor="middle" font-size="10" fill="#fbbf24">요청 라우팅 + 백프레셔</text>
  <path d="M 600.0,162 L 600,198" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="150" y="330" width="260" height="170" rx="12" fill="#0f172a"/>
  <rect x="150" y="330" width="260" height="170" rx="12" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="280.0" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#fed7aa">LLM Layer</text>
  <text x="280.0" y="380" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">provider abstraction</text>
  <text x="170" y="410" font-size="12" fill="#fb923c">• cache (prompt key)</text>
  <text x="170" y="432" font-size="12" fill="#fb923c">• retry + backoff</text>
  <text x="170" y="454" font-size="12" fill="#fb923c">• circuit breaker</text>
  <text x="170" y="476" font-size="12" fill="#fb923c">• model router</text>
  <rect x="470" y="330" width="260" height="170" rx="12" fill="#0f172a"/>
  <rect x="470" y="330" width="260" height="170" rx="12" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="600.0" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#a5f3fc">Retrieval Layer</text>
  <text x="600.0" y="380" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">vector + lexical</text>
  <text x="490" y="410" font-size="12" fill="#22d3ee">• embedding cache</text>
  <text x="490" y="432" font-size="12" fill="#22d3ee">• vector store</text>
  <text x="490" y="454" font-size="12" fill="#22d3ee">• reranker</text>
  <text x="490" y="476" font-size="12" fill="#22d3ee">• filter (metadata)</text>
  <rect x="790" y="330" width="260" height="170" rx="12" fill="#0f172a"/>
  <rect x="790" y="330" width="260" height="170" rx="12" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="920.0" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#fbcfe8">Session Store</text>
  <text x="920.0" y="380" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">Redis · KV + TTL</text>
  <text x="810" y="410" font-size="12" fill="#f472b6">• thread state</text>
  <text x="810" y="432" font-size="12" fill="#f472b6">• user prefs</text>
  <text x="810" y="454" font-size="12" fill="#f472b6">• rate window</text>
  <text x="810" y="476" font-size="12" fill="#f472b6">• idempotency key</text>
  <path d="M 600,272 L 280.0,328" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 600,272 L 600.0,328" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 600,272 L 920.0,328" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="150" y="540" width="900" height="70" rx="12" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="600.0" y="568" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">Observability Bus  ·  trace · log · cost · latency</text>
  <text x="600.0" y="590" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">LangSmith / Langfuse / OpenTelemetry → Ch 27</text>
  <path d="M 280.0,502 L 280.0,538" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <path d="M 600.0,502 L 600.0,538" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <path d="M 920.0,502 L 920.0,538" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
</svg>