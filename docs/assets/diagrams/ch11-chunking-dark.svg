  <text x="580" y="80" text-anchor="middle" font-size="11" fill="#94a3b8">← 문서 한 개 (예: 10페이지 정책 문서) →</text>
  <text x="40" y="330" font-size="11" fill="#94a3b8">• 작게: 세밀 · 맥락 손실  |  중간: 균형 (권장)  |  크게: 맥락 보존 · 정밀도↓</text>
