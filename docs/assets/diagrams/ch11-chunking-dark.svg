  <rect width="1000" height="380" fill="#020617"/>
  <rect width="1000" height="380" fill="url(#grid)"/>
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Chunking 전략 — 크기의 트레이드오프</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">너무 작으면 맥락 손실, 너무 크면 정밀도 하락</text>
  <text x="40" y="130" font-size="13" font-weight="700" fill="#f1f5f9">작게 (~200토큰)</text>
