  <text x="580.0" y="420" text-anchor="middle" font-size="12" fill="#334155">Data 툴 (조회 · 안전) = 자동. Action 툴 (결제 · 삭제 · 전송) = 승인 큐 경유. 룰은 tool metadata 에 박아둔다.</text>
