  <text x="110.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">요청</text>
  <text x="110.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">user input</text>
  <rect x="220" y="190" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="220" y="190" width="140" height="90" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="290.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">LLM</text>
  <text x="290.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">JSON 생성</text>
  <rect x="420" y="190" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="420" y="190" width="140" height="90" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="490.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a5f3fc">파싱</text>
  <text x="490.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">json.loads</text>
  <rect x="620" y="190" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="620" y="190" width="140" height="90" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="690.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">검증</text>
  <text x="690.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">Pydantic</text>
  <rect x="220" y="340" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="220" y="340" width="140" height="90" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="290.0" y="381.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">통과</text>
  <text x="290.0" y="397.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">dict → 사용</text>
  <rect x="480" y="340" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="480" y="340" width="140" height="90" rx="10" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="550.0" y="381.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fbcfe8">재시도</text>
  <text x="550.0" y="397.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">with error ctx</text>
  <rect x="740" y="340" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="740" y="340" width="140" height="90" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
  <text x="810.0" y="381.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fecaca">Fallback</text>
  <text x="810.0" y="397.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f87171">규칙/기본값</text>
