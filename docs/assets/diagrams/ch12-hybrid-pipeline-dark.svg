  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">Dense(의미) + BM25(키워드) 병렬 → RRF 병합 → Cross-encoder rerank</text>
  <path d="M 180,225 L 260,155" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
