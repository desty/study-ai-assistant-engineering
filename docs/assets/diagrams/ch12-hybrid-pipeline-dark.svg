  <text x="110.0" y="241.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">쿼리</text>
  <text x="110.0" y="257.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">user query</text>
  <rect x="260" y="110" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="260" y="110" width="140" height="90" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="330.0" y="151.0" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">Dense</text>
  <text x="330.0" y="167.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">임베딩 + ANN</text>
  <text x="330.0" y="183.0" text-anchor="middle" font-size="10" fill="#a78bfa">의미 검색</text>
  <rect x="260" y="290" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="260" y="290" width="140" height="90" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="330.0" y="331.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a5f3fc">BM25</text>
  <text x="330.0" y="347.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">키워드 통계</text>
  <text x="330.0" y="363.0" text-anchor="middle" font-size="10" fill="#22d3ee">용어 일치</text>
