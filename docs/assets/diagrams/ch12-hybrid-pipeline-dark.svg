  <text x="220.0" y="176.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">query vec</text>
  <path d="M 180,265 L 260,335" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="170.0" y="273.0" width="100" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="220.0" y="286.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">query tokens</text>
