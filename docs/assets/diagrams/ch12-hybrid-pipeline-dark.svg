  <text x="570.0" y="257.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">reciprocal rank</text>
  <rect x="720" y="200" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="720" y="200" width="140" height="90" rx="10" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="790.0" y="241.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fbcfe8">Rerank</text>
  <text x="790.0" y="257.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">cross-encoder</text>
  <rect x="940" y="200" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="940" y="200" width="140" height="90" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1010.0" y="241.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">최종 top-k</text>
  <text x="1010.0" y="257.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">정밀</text>
