  <path d="M 400,335 L 500,270" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="421.0" y="275.5" width="58" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="450.0" y="288.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">top-20</text>
  <path d="M 640,245 L 720,245" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 860,245 L 940,245" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="874.5" y="218.0" width="51" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="900.0" y="231.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">top-5</text>
