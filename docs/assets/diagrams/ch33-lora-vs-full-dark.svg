<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1200" height="540" fill="#020617"/>
  <rect width="1200" height="540" fill="url(#grid)"/>
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Full FT vs LoRA — 무엇이 학습되나</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">Full FT 는 모든 가중치 W 를 갱신. LoRA 는 W 는 동결, 옆에 작은 A·B 만 학습.</text>
  <rect x="80" y="100" width="480" height="320" rx="12" fill="rgba(248,113,113,0.05)" stroke="#f87171" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="92" y="118" font-size="10" font-weight="700" fill="#f87171" font-family="JetBrains Mono, monospace">FULL FINE-TUNING</text>
  <rect x="640" y="100" width="480" height="320" rx="12" fill="rgba(52,211,153,0.05)" stroke="#34d399" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="652" y="118" font-size="10" font-weight="700" fill="#34d399" font-family="JetBrains Mono, monospace">LORA · LOW-RANK ADAPTATION</text>
  <rect x="210" y="190" width="220" height="140" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="2.5"/>
  <text x="320.0" y="240" text-anchor="middle" font-size="38" font-weight="700" fill="#fecaca" font-family="JetBrains Mono, monospace">W</text>
  <text x="320.0" y="278" text-anchor="middle" font-size="13" fill="#f87171">d × d (수백M~수십B)</text>
  <text x="320.0" y="300" text-anchor="middle" font-size="13" font-weight="700" fill="#fecaca">전체 갱신 🔥</text>
  <text x="320.0" y="322" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f87171">trainable = 100%</text>
  <text x="110" y="360" font-size="12" fill="#f87171">• VRAM: 8B 모델 ≈ 80 GB+ (옵티마이저 포함)</text>
  <text x="110" y="382" font-size="12" fill="#f87171">• 체크포인트: 16~32 GB</text>
  <text x="110" y="404" font-size="12" fill="#f87171">• 학습 시간: 며칠 (8B 기준)</text>
  <text x="110" y="426" font-size="12" fill="#f87171">• 새 모델 = 새 가중치 전체</text>
  <rect x="700" y="200" width="180" height="120" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="790.0" y="250" text-anchor="middle" font-size="32" font-weight="700" fill="#ddd6fe" font-family="JetBrains Mono, monospace">W</text>
  <text x="790.0" y="278" text-anchor="middle" font-size="12" font-weight="700" fill="#ddd6fe">동결 🧊</text>
  <text x="790.0" y="300" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">freeze</text>
  <text x="898" y="270.0" text-anchor="middle" font-size="36" font-weight="700" fill="#f1f5f9">+</text>
  <rect x="928" y="210" width="35" height="100" rx="6" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="2"/>
  <text x="945.5" y="265.0" text-anchor="middle" font-size="20" font-weight="700" fill="#a7f3d0" font-family="JetBrains Mono, monospace">A</text>
  <text x="945.5" y="326" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#34d399">d×r</text>
  <rect x="979" y="242.5" width="100" height="35" rx="6" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="2"/>
  <text x="1029.0" y="265.0" text-anchor="middle" font-size="20" font-weight="700" fill="#a7f3d0" font-family="JetBrains Mono, monospace">B</text>
  <text x="1029.0" y="291.5" text-anchor="middle" font-size="9" font-family="JetBrains Mono, monospace" fill="#34d399">r×d</text>
  <text x="995.5" y="198" text-anchor="middle" font-size="11" font-weight="700" fill="#a7f3d0">학습 🔥 (r=8~64)</text>
  <text x="880.0" y="356" text-anchor="middle" font-size="14" font-family="JetBrains Mono, monospace" fill="#f1f5f9">W' = W + A·B  ·  trainable ≈ 0.1~1% of full</text>
  <text x="670" y="380" font-size="12" fill="#34d399">• VRAM: 8B 모델 ≈ 16~24 GB (QLoRA 면 ~10 GB)</text>
  <text x="670" y="402" font-size="12" fill="#34d399">• 체크포인트: 수십 MB ~ 수백 MB</text>
  <text x="670" y="424" font-size="12" fill="#34d399">• 학습 시간: 수 시간</text>
  <text x="670" y="446" font-size="12" fill="#34d399">• Adapter 만 저장 · 베이스 공유 · 합치기 가능</text>
  <rect x="40" y="505" width="1120" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="600.0" y="521" text-anchor="middle" font-size="11" fill="#cbd5e1">대부분의 도메인 SFT 는 LoRA 로 충분. Full FT 는 base 모델 자체를 만들 때만.</text>
</svg>