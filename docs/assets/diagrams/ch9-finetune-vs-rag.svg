<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="1000" height="340" fill="#ffffff"/>
  <rect width="1000" height="340" fill="url(#grid)"/>
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Fine-tune vs RAG — 언제 뭘 쓰나</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#64748b">해결하려는 게 "지식"이면 RAG, "행동·스타일"이면 파인튜닝</text>
  <rect x="60" y="110" width="400" height="180" rx="10" fill="#ffffff"/>
  <rect x="60" y="110" width="400" height="180" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="260.0" y="196.0" text-anchor="middle" font-size="14" font-weight="700" fill="#083344">RAG 선택</text>
  <text x="260.0" y="212.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#0e7490">외부 지식</text>
  <text x="80" y="215" font-size="11" fill="#083344">• 최신 정보 (가격·재고·이벤트)</text>
  <text x="80" y="235" font-size="11" fill="#083344">• 회사 내부 문서 (정책·매뉴얼)</text>
  <text x="80" y="255" font-size="11" fill="#083344">• 추적 가능성 (citation)</text>
  <text x="80" y="275" font-size="11" fill="#083344">• 자주 바뀌는 데이터</text>
  <rect x="540" y="110" width="400" height="180" rx="10" fill="#ffffff"/>
  <rect x="540" y="110" width="400" height="180" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="740.0" y="196.0" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Fine-tune 선택</text>
  <text x="740.0" y="212.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">모델 행동</text>
  <text x="560" y="215" font-size="11" fill="#4c1d95">• 특정 말투·포맷 고정</text>
  <text x="560" y="235" font-size="11" fill="#4c1d95">• 복잡한 분류·추출 태스크</text>
  <text x="560" y="255" font-size="11" fill="#4c1d95">• 소형 모델로 품질·비용 최적화</text>
  <text x="560" y="275" font-size="11" fill="#4c1d95">• 변경 주기 긴 지식</text>
</svg>