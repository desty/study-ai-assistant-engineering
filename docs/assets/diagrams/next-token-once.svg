  <text x="702.0" y="154.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">output</text>
  <text x="702.0" y="170.5" text-anchor="middle" font-size="10" fill="#047857">'김치찌개'</text>
