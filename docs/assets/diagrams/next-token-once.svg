  <text x="366.0" y="170.5" text-anchor="middle" font-size="10" fill="#6d28d9">다음 토큰 확률</text>
  <rect x="464" y="90" width="140" height="105" rx="10" fill="#ffffff"/>
  <rect x="464" y="90" width="140" height="105" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
