  <text x="500.0" y="321.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">문서</text>
  <path d="M 680,335 L 760,335" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="40" y="200" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="40" y="200" width="140" height="90" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="110.0" y="241.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">질문</text>
  <text x="110.0" y="257.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">user</text>
