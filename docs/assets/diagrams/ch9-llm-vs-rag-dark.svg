  <rect x="320" y="100" width="140" height="110" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="390.0" y="151.0" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">LLM</text>
  <text x="390.0" y="167.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">학습 지식만</text>
  <text x="390.0" y="183.0" text-anchor="middle" font-size="10" fill="#a78bfa">hallucination 위험</text>
  <rect x="640" y="100" width="140" height="110" rx="10" fill="#0f172a"/>
  <rect x="640" y="100" width="140" height="110" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
  <text x="710.0" y="151.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fecaca">답</text>
  <text x="710.0" y="167.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f87171">출처 없음</text>
  <text x="710.0" y="183.0" text-anchor="middle" font-size="10" fill="#f87171">그럴듯한 추측</text>
  <rect x="320" y="290" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="320" y="290" width="140" height="90" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="390.0" y="331.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a5f3fc">검색</text>
  <text x="390.0" y="347.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">vector DB</text>
