  <rect x="540" y="290" width="140" height="90" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="610.0" y="331.0" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">LLM</text>
  <text x="610.0" y="347.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">+ 검색 문서</text>
  <rect x="760" y="290" width="140" height="90" rx="10" fill="#0f172a"/>
  <rect x="760" y="290" width="140" height="90" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="830.0" y="331.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">답</text>
  <text x="830.0" y="347.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">출처 포함</text>
</svg>