<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="900" height="240" fill="#020617"/>
  <rect width="900" height="240" fill="url(#grid)"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">hallucination이 생기는 순간</text>
  <path d="M 302,140 L 328,140" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 572,140 L 598,140" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="60" y="80" width="240" height="120" rx="10" fill="#0f172a"/>
  <rect x="60" y="80" width="240" height="120" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="180.0" y="136.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">질문</text>
  <text x="180.0" y="152.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">user</text>
  <text x="180.0" y="168.0" text-anchor="middle" font-size="10" fill="#60a5fa">'발명가 홍길동의 대표 특허는?'</text>
  <rect x="330" y="80" width="240" height="120" rx="10" fill="#0f172a"/>
  <rect x="330" y="80" width="240" height="120" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="450.0" y="136.0" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">내부 상태</text>
  <text x="450.0" y="152.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">reasoning</text>
  <text x="450.0" y="168.0" text-anchor="middle" font-size="10" fill="#a78bfa">'발명가+특허'에 맞을 것만 조합</text>
  <rect x="600" y="80" width="240" height="120" rx="10" fill="#0f172a"/>
  <rect x="600" y="80" width="240" height="120" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
  <text x="720.0" y="136.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fecaca">확신 오답</text>
  <text x="720.0" y="152.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f87171">hallucination</text>
  <text x="720.0" y="168.0" text-anchor="middle" font-size="10" fill="#f87171">그럴듯한 특허명 창작</text>
</svg>