<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 340" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1000" height="340" fill="#020617"/>
  <rect width="1000" height="340" fill="url(#grid)"/>
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Fine-tune vs RAG — 언제 뭘 쓰나</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">해결하려는 게 "지식"이면 RAG, "행동·스타일"이면 파인튜닝</text>
  <rect x="60" y="110" width="400" height="180" rx="10" fill="#0f172a"/>
  <rect x="60" y="110" width="400" height="180" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="260.0" y="196.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a5f3fc">RAG 선택</text>
  <text x="260.0" y="212.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">외부 지식</text>
  <text x="80" y="215" font-size="11" fill="#a5f3fc">• 최신 정보 (가격·재고·이벤트)</text>
  <text x="80" y="235" font-size="11" fill="#a5f3fc">• 회사 내부 문서 (정책·매뉴얼)</text>
  <text x="80" y="255" font-size="11" fill="#a5f3fc">• 추적 가능성 (citation)</text>
  <text x="80" y="275" font-size="11" fill="#a5f3fc">• 자주 바뀌는 데이터</text>
  <rect x="540" y="110" width="400" height="180" rx="10" fill="#0f172a"/>
  <rect x="540" y="110" width="400" height="180" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="740.0" y="196.0" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">Fine-tune 선택</text>
  <text x="740.0" y="212.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">모델 행동</text>
  <text x="560" y="215" font-size="11" fill="#ddd6fe">• 특정 말투·포맷 고정</text>
  <text x="560" y="235" font-size="11" fill="#ddd6fe">• 복잡한 분류·추출 태스크</text>
  <text x="560" y="255" font-size="11" fill="#ddd6fe">• 소형 모델로 품질·비용 최적화</text>
  <text x="560" y="275" font-size="11" fill="#ddd6fe">• 변경 주기 긴 지식</text>
</svg>