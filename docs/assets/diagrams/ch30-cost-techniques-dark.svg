  <text x="306" y="276" text-anchor="end" font-size="13" font-weight="700" fill="#f1f5f9">+ Model routing</text>
  <rect x="320" y="246" width="224.0" height="50" rx="6" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="334" y="276" font-size="14" font-weight="700" fill="#fde68a">32%</text>
  <text x="1040" y="264" font-size="12" font-family="JetBrains Mono, monospace" fill="#cbd5e1">$0.008 · 1200ms</text>
