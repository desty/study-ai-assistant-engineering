  <text x="620" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">비용·지연 4 레버 — Baseline 대비 효과</text>
  <text x="620" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">캐싱 · 라우팅 · 배치 · 컨텍스트 압축. 레버는 누적 가능하지만 첫 한 개로 보통 절반이 빠진다.</text>
