  <text x="1040" y="400" font-size="12" font-family="JetBrains Mono, monospace" fill="#cbd5e1">$0.0035 · 900ms</text>
  <text x="1040" y="418" font-size="11" fill="#34d399">이력 요약 · max_tokens 축소</text>
  <line x1="1020" y1="104" x2="1020" y2="450" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,3"/>
  <text x="1020" y="98" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#cbd5e1">baseline 100%</text>
  <rect x="40" y="505" width="1160" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="620.0" y="521" text-anchor="middle" font-size="11" fill="#cbd5e1">수치는 예시. 도메인·트래픽에 따라 효과 달라짐 — 실측 후 적용 순서 결정.</text>
