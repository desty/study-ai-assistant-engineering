<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 480" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="1180" height="480" fill="#ffffff"/>
  <rect width="1180" height="480" fill="url(#grid)"/>
  <text x="590" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">증류 (Distillation) — 큰 모델로 작은 모델 가르치기</text>
  <text x="590" y="58" text-anchor="middle" font-size="12" fill="#64748b">Teacher (Opus) 가 만든 답을 Student (Haiku) 가 학습. 비용·지연 절감 + 도메인 특화.</text>
  <rect x="60" y="200" width="160" height="80" rx="10" fill="#ffffff"/>
  <rect x="60" y="200" width="160" height="80" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="140.0" y="236.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">Unlabeled Q</text>
  <text x="140.0" y="252.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">log · 합성</text>
  <text x="140.0" y="268.0" text-anchor="middle" font-size="10" fill="#1e40af">수K~수만</text>
  <rect x="280" y="130" width="200" height="140" rx="14" fill="#fef3e0" stroke="#ea580c" stroke-width="2.5"/>
  <text x="380.0" y="166" text-anchor="middle" font-size="16" font-weight="700" fill="#9a3412">Teacher</text>
  <text x="380.0" y="190" text-anchor="middle" font-size="13" font-family="JetBrains Mono, monospace" fill="#c2410c">Opus / GPT-4</text>
  <text x="380.0" y="216" text-anchor="middle" font-size="11" fill="#c2410c">정확 · 비싸 · 느림</text>
  <text x="380.0" y="240" text-anchor="middle" font-size="11" fill="#c2410c">$0.030/req</text>
  <rect x="540" y="200" width="160" height="80" rx="10" fill="#ffffff"/>
  <rect x="540" y="200" width="160" height="80" rx="10" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="620.0" y="236.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">(q, a*) Dataset</text>
  <text x="620.0" y="252.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">Teacher 답을 정답으로</text>
  <text x="620.0" y="268.0" text-anchor="middle" font-size="10" fill="#047857">필터링·검증 필수</text>
  <rect x="760" y="130" width="160" height="140" rx="14" fill="#d1fae5" stroke="#059669" stroke-width="2.5"/>
  <text x="840.0" y="166" text-anchor="middle" font-size="16" font-weight="700" fill="#064e3b">Student</text>
  <text x="840.0" y="190" text-anchor="middle" font-size="13" font-family="JetBrains Mono, monospace" fill="#047857">Haiku / 8B</text>
  <text x="840.0" y="216" text-anchor="middle" font-size="11" fill="#047857">SFT · LoRA</text>
  <text x="840.0" y="240" text-anchor="middle" font-size="11" fill="#047857">$0.001/req</text>
  <rect x="980" y="200" width="160" height="80" rx="10" fill="#ffffff"/>
  <rect x="980" y="200" width="160" height="80" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="1060.0" y="236.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">Deploy</text>
  <text x="1060.0" y="252.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">30× 저렴</text>
  <text x="1060.0" y="268.0" text-anchor="middle" font-size="10" fill="#a16207">도메인 특화</text>
  <path d="M 222,240.0 L 278,200.0" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 482,200.0 L 538,240.0" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="474.0" y="193.0" width="72" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="510.0" y="206.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">generate</text>
  <path d="M 702,240.0 L 758,200.0" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="704.5" y="193.0" width="51" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="730.0" y="206.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">train</text>
  <path d="M 922,200.0 L 978,240.0" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <text x="510.0" y="188" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#7f1d1d">+ 필터 (judge · 규칙)</text>
  <rect x="40" y="445" width="1100" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="590.0" y="461" text-anchor="middle" font-size="11" fill="#334155">Teacher 의 편향·할루시 그대로 복제 위험. 필터링이 학습보다 중요.</text>
</svg>