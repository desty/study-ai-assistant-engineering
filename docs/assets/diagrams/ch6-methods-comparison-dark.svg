<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1000" height="300" fill="#020617"/>
  <rect width="1000" height="300" fill="url(#grid)"/>
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">구조화 출력의 3가지 방법</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">왼쪽일수록 쉽고, 오른쪽일수록 엄격 — 프로덕션은 오른쪽으로</text>
  <path d="M 332,180 L 368,180" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 632,180 L 668,180" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="70" y="110" width="260" height="140" rx="10" fill="#0f172a"/>
  <rect x="70" y="110" width="260" height="140" rx="10" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="200.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fbcfe8">프롬프트 힌트</text>
  <text x="200.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">prompt hint</text>
  <text x="200.0" y="208.0" text-anchor="middle" font-size="10" fill="#f472b6">적중률 70~90%</text>
  <rect x="370" y="110" width="260" height="140" rx="10" fill="#0f172a"/>
  <rect x="370" y="110" width="260" height="140" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="500.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a5f3fc">Tool-use 스키마</text>
  <text x="500.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">tool schema</text>
  <text x="500.0" y="208.0" text-anchor="middle" font-size="10" fill="#22d3ee">적중률 95~99%</text>
  <rect x="670" y="110" width="260" height="140" rx="10" fill="#0f172a"/>
  <rect x="670" y="110" width="260" height="140" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="800.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">Native JSON mode</text>
  <text x="800.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">json_schema</text>
  <text x="800.0" y="208.0" text-anchor="middle" font-size="10" fill="#34d399">적중률 ~100%</text>
</svg>