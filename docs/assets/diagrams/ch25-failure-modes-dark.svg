<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1140 440" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1140" height="440" fill="#020617"/>
  <rect width="1140" height="440" fill="url(#grid)"/>
  <text x="570" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Multi-Agent 3대 실패 — 쪼개기 전에 알아둘 것</text>
  <text x="570" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">복잡도는 4배, 실패 모드는 4배 이상. 단일 agent 로 못 푸는 걸 확인한 뒤 도입.</text>
  <rect x="30" y="95" width="340" height="300" rx="10" fill="#0f172a"/>
  <rect x="30" y="95" width="340" height="300" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
  <text x="50" y="127" font-size="16" font-weight="700" fill="#fecaca">① Context 누락</text>
  <text x="50" y="149" font-size="12" font-family="JetBrains Mono, monospace" fill="#f87171">agent 간 정보 전달 실패</text>
  <line x1="50" y1="165" x2="350" y2="165" stroke="#f87171" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="50" y="187" font-size="11" font-weight="700" fill="#fecaca">시나리오</text>
  <text x="60" y="207" font-size="11" fill="#f87171">• Researcher → Writer 로 넘김</text>
  <text x="60" y="227" font-size="11" fill="#f87171">• Writer 는 원본 문서 못 봄</text>
  <text x="60" y="247" font-size="11" fill="#f87171">• → 요약의 요약 (hallucination↑)</text>
  <rect x="44" y="295" width="312" height="80" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="54" y="315" font-size="11" font-weight="700" fill="#a7f3d0" font-family="JetBrains Mono, monospace">대응</text>
  <text x="54" y="335" font-size="11" fill="#a7f3d0">Manager 패턴 · shared state</text>
  <text x="54" y="351" font-size="11" fill="#a7f3d0">모든 agent 가 full context 읽게</text>
  <rect x="400" y="95" width="340" height="300" rx="10" fill="#0f172a"/>
  <rect x="400" y="95" width="340" height="300" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
  <text x="420" y="127" font-size="16" font-weight="700" fill="#fecaca">② 무한 토스 루프</text>
  <text x="420" y="149" font-size="12" font-family="JetBrains Mono, monospace" fill="#f87171">peer 간 서로 미룸</text>
  <line x1="420" y1="165" x2="720" y2="165" stroke="#f87171" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="420" y="187" font-size="11" font-weight="700" fill="#fecaca">시나리오</text>
  <text x="430" y="207" font-size="11" fill="#f87171">• Writer → Critic → Writer → …</text>
  <text x="430" y="227" font-size="11" fill="#f87171">• 명시적 종료 조건 없음</text>
  <text x="430" y="247" font-size="11" fill="#f87171">• → 비용 · 지연 폭발</text>
  <rect x="414" y="295" width="312" height="80" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="424" y="315" font-size="11" font-weight="700" fill="#a7f3d0" font-family="JetBrains Mono, monospace">대응</text>
  <text x="424" y="335" font-size="11" fill="#a7f3d0">max_handoffs 상한</text>
  <text x="424" y="351" font-size="11" fill="#a7f3d0">Critic 에 "approve" 명시적 액션</text>
  <rect x="770" y="95" width="340" height="300" rx="10" fill="#0f172a"/>
  <rect x="770" y="95" width="340" height="300" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
  <text x="790" y="127" font-size="16" font-weight="700" fill="#fecaca">③ 책임 불명확</text>
  <text x="790" y="149" font-size="12" font-family="JetBrains Mono, monospace" fill="#f87171">누가 최종 결정?</text>
  <line x1="790" y1="165" x2="1090" y2="165" stroke="#f87171" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="790" y="187" font-size="11" font-weight="700" fill="#fecaca">시나리오</text>
  <text x="800" y="207" font-size="11" fill="#f87171">• Researcher: "데이터 여기 있음"</text>
  <text x="800" y="227" font-size="11" fill="#f87171">• Writer: "애매한데, 확인해줘"</text>
  <text x="800" y="247" font-size="11" fill="#f87171">• → 무한 대기 · 사용자 응답 X</text>
  <rect x="784" y="295" width="312" height="80" rx="6" fill="#0f172a" stroke="#34d399" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="794" y="315" font-size="11" font-weight="700" fill="#a7f3d0" font-family="JetBrains Mono, monospace">대응</text>
  <text x="794" y="335" font-size="11" fill="#a7f3d0">Owner 지정 (default = Manager)</text>
  <text x="794" y="351" font-size="11" fill="#a7f3d0">최종 응답 node 단일화</text>
  <text x="570.0" y="425" text-anchor="middle" font-size="12" fill="#cbd5e1">"단일 agent 로 안 풀린다" 의 증거를 제시할 수 없다면 쪼개지 않는다.</text>
</svg>