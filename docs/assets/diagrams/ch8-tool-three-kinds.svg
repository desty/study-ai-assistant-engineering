<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="1000" height="320" fill="#ffffff"/>
  <rect width="1000" height="320" fill="url(#grid)"/>
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">툴의 3가지 종류 (OpenAI Practical Guide)</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#64748b">무슨 일을 하느냐로 분류 · 안전성 관점이 다름</text>
  <path d="M 332,180 L 358,180" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 642,180 L 668,180" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="50" y="110" width="280" height="140" rx="10" fill="#ffffff"/>
  <rect x="50" y="110" width="280" height="140" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="190.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#083344">Data</text>
  <text x="190.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#0e7490">retrieve</text>
  <text x="190.0" y="208.0" text-anchor="middle" font-size="10" fill="#0e7490">컨텍스트 조회 (읽기)</text>
  <rect x="360" y="110" width="280" height="140" rx="10" fill="#ffffff"/>
  <rect x="360" y="110" width="280" height="140" rx="10" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="500.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Action</text>
  <text x="500.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">mutate</text>
  <text x="500.0" y="208.0" text-anchor="middle" font-size="10" fill="#c2410c">상태 변경 (쓰기·결제·발송)</text>
  <rect x="670" y="110" width="280" height="140" rx="10" fill="#ffffff"/>
  <rect x="670" y="110" width="280" height="140" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="810.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#500724">Orchestration</text>
  <text x="810.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">sub-agent</text>
  <text x="810.0" y="208.0" text-anchor="middle" font-size="10" fill="#be185d">다른 에이전트/툴 조합</text>
</svg>