  <text x="345.0" y="250" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">난이도 분류</text>
  <text x="345.0" y="272" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a16207">~$0.0005 · 200ms</text>
  <rect x="500" y="80" width="220" height="90" rx="12" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="516" y="106" font-size="14" font-weight="700" fill="#9a3412">Haiku</text>
  <text x="704" y="106" text-anchor="end" font-size="14" font-weight="700" fill="#9a3412">60%</text>
  <text x="516" y="128" font-size="11" fill="#c2410c">FAQ · 분류 · 요약</text>
  <text x="516" y="152" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">$0.001 · 400ms</text>
  <rect x="500" y="184" width="220" height="90" rx="12" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="516" y="210" font-size="14" font-weight="700" fill="#9a3412">Sonnet</text>
  <text x="704" y="210" text-anchor="end" font-size="14" font-weight="700" fill="#9a3412">30%</text>
  <text x="516" y="232" font-size="11" fill="#c2410c">일반 답변</text>
  <text x="516" y="256" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">$0.012 · 1200ms</text>
  <rect x="500" y="288" width="220" height="90" rx="12" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="516" y="314" font-size="14" font-weight="700" fill="#9a3412">Opus</text>
  <text x="704" y="314" text-anchor="end" font-size="14" font-weight="700" fill="#9a3412">10%</text>
  <text x="516" y="336" font-size="11" fill="#c2410c">복잡 추론·코드</text>
  <text x="516" y="360" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">$0.030 · 2400ms</text>
  <path d="M 192,235.0 L 258,250.0" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 432,250.0 L 498,125.0" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 432,250.0 L 498,229.0" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 432,250.0 L 498,333.0" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="860" y="200" width="130" height="70" rx="10" fill="#ffffff"/>
  <rect x="860" y="200" width="130" height="70" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="925.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">Response</text>
  <path d="M 722,125.0 L 860,235.0" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <path d="M 722,229.0 L 860,235.0" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <path d="M 722,333.0 L 860,235.0" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="980" y="80" width="180" height="250" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="996" y="104" font-size="13" font-weight="700" fill="#0f172a">실효 비용</text>
  <text x="996" y="132" font-size="12" font-family="JetBrains Mono, monospace" fill="#334155">평균 = </text>
  <text x="996" y="154" font-size="12" font-family="JetBrains Mono, monospace" fill="#334155">0.6×0.001</text>
  <text x="996" y="176" font-size="12" font-family="JetBrains Mono, monospace" fill="#334155">+ 0.3×0.012</text>
  <text x="996" y="198" font-size="12" font-family="JetBrains Mono, monospace" fill="#334155">+ 0.1×0.030</text>
  <text x="996" y="220" font-size="12" font-family="JetBrains Mono, monospace" fill="#334155">+ classifier</text>
  <text x="996" y="242" font-size="12" font-family="JetBrains Mono, monospace" fill="#334155">= ~$0.0073</text>
  <text x="996" y="264" font-size="12" font-family="JetBrains Mono, monospace" fill="#334155"></text>
  <text x="996" y="286" font-size="12" font-family="JetBrains Mono, monospace" fill="#334155">baseline Opus</text>
  <text x="996" y="308" font-size="12" font-family="JetBrains Mono, monospace" fill="#334155">$0.030 의 24%</text>
  <rect x="40" y="445" width="1100" height="22" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="590.0" y="461" text-anchor="middle" font-size="11" fill="#334155">분류기가 틀리면 품질 저하 — 평가셋에서 라우팅 정확도 별도 측정 (Ch 16/17).</text>
