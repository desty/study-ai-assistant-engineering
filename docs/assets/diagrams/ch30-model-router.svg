  <rect width="1180" height="480" fill="#ffffff"/>
  <rect width="1180" height="480" fill="url(#grid)"/>
  <text x="590" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">모델 라우터 — 한 모델로 다 풀지 말 것</text>
  <text x="590" y="58" text-anchor="middle" font-size="12" fill="#64748b">쉬운 질의는 Haiku 로 · 어려운 것만 Opus. 분류기 비용을 합쳐도 baseline 대비 60% 절감.</text>
  <rect x="60" y="200" width="130" height="70" rx="10" fill="#ffffff"/>
  <rect x="60" y="200" width="130" height="70" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="125.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">Query</text>
  <text x="125.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">사용자 입력</text>
  <rect x="260" y="200" width="170" height="100" rx="12" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
