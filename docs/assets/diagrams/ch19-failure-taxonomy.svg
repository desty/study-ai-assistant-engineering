  <text x="380.0" y="418" text-anchor="middle" font-size="10" fill="#064e3b" font-family="JetBrains Mono, monospace">임베딩 교체</text>
  <path d="M 580,142 L 580.0,218" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="490" y="220" width="180" height="130" rx="10" fill="#ffffff"/>
  <rect x="490" y="220" width="180" height="130" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="580.0" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#083344">3. Data</text>
