  <rect width="1160" height="480" fill="#ffffff"/>
  <rect width="1160" height="480" fill="url(#grid)"/>
  <text x="580" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">실패 분류 Taxonomy — 어느 층의 문제인가</text>
  <text x="580" y="58" text-anchor="middle" font-size="12" fill="#64748b">"왜 틀렸는가?"를 층별로 쪼개야 수정이 가능하다. LLM 교체는 최후.</text>
  <rect x="480" y="85" width="200" height="55" rx="10" fill="#ffffff"/>
  <rect x="480" y="85" width="200" height="55" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="580.0" y="108.5" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">실패 사례 (log)</text>
  <text x="580.0" y="124.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#b91c1c">👎 · low judge score</text>
