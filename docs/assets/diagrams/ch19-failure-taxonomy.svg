  <text x="580.0" y="418" text-anchor="middle" font-size="10" fill="#064e3b" font-family="JetBrains Mono, monospace">문서 정제</text>
  <path d="M 580,142 L 780.0,218" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="690" y="220" width="180" height="130" rx="10" fill="#ffffff"/>
  <rect x="690" y="220" width="180" height="130" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="780.0" y="248" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">4. Generation</text>
  <text x="780.0" y="278" text-anchor="middle" font-size="11" fill="#6d28d9">문서 있는데 답을</text>
  <text x="780.0" y="296" text-anchor="middle" font-size="11" fill="#6d28d9">왜곡 / hallucination</text>
  <path d="M 780.0,352 L 780.0,378" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="700" y="380" width="160" height="60" rx="6" fill="#f8fafc" stroke="#059669" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="780.0" y="402" text-anchor="middle" font-size="10" fill="#064e3b" font-family="JetBrains Mono, monospace">temperature↓</text>
  <text x="780.0" y="418" text-anchor="middle" font-size="10" fill="#064e3b" font-family="JetBrains Mono, monospace">CoT · Ch 18</text>
  <path d="M 580,142 L 980.0,218" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="890" y="220" width="180" height="130" rx="10" fill="#ffffff"/>
