  <text x="380.0" y="278" text-anchor="middle" font-size="11" fill="#be185d">top-k 에 정답 없음</text>
  <text x="380.0" y="296" text-anchor="middle" font-size="11" fill="#be185d">(Ch 12 recall↓)</text>
  <path d="M 380.0,352 L 380.0,378" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="300" y="380" width="160" height="60" rx="6" fill="#f8fafc" stroke="#059669" stroke-width="1" stroke-dasharray="4,3"/>
