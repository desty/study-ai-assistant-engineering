  <text x="180.0" y="296" text-anchor="middle" font-size="11" fill="#1e40af">부족 · 모호</text>
  <path d="M 180.0,352 L 180.0,378" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="100" y="380" width="160" height="60" rx="6" fill="#f8fafc" stroke="#059669" stroke-width="1" stroke-dasharray="4,3"/>
