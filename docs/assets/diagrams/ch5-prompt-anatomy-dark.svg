  <rect x="808" y="100" width="160" height="115" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="888.0" y="153.5" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">응답</text>
  <text x="888.0" y="169.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">assistant</text>
  <text x="888.0" y="185.5" text-anchor="middle" font-size="10" fill="#34d399">원하는 형식</text>
