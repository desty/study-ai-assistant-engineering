  <text x="520.0" y="185.5" text-anchor="middle" font-size="10" fill="#60a5fa">실제 요청</text>
  <rect x="624" y="100" width="160" height="115" rx="10" fill="#0f172a"/>
  <rect x="624" y="100" width="160" height="115" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="704.0" y="153.5" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">LLM</text>
  <text x="704.0" y="169.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">inference</text>
