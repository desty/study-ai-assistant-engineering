  <text x="336.0" y="153.5" text-anchor="middle" font-size="14" font-weight="700" fill="#fbcfe8">Few-shot 예시</text>
  <text x="336.0" y="169.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">optional</text>
