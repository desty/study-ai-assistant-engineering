  <path d="M 418,157 L 438,157" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 602,157 L 622,157" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 786,157 L 806,157" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="72" y="100" width="160" height="115" rx="10" fill="#0f172a"/>
