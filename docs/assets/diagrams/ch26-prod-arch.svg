<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 640" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="1200" height="640" fill="#ffffff"/>
  <rect width="1200" height="640" fill="url(#grid)"/>
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Production 아키텍처 — PoC 와의 차이는 "분리"</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#64748b">API · LLM · Retrieval · Session · Observability 다섯 레이어가 각자 실패하고 각자 회복한다.</text>
  <rect x="525" y="90" width="150" height="70" rx="10" fill="#ffffff"/>
  <rect x="525" y="90" width="150" height="70" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="600.0" y="121.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">Client</text>
  <text x="600.0" y="137.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">Web · Mobile · API</text>
  <rect x="480" y="200" width="240" height="70" rx="10" fill="#ffffff"/>
  <rect x="480" y="200" width="240" height="70" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="600.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">API Gateway (FastAPI)</text>
  <text x="600.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">auth · rate limit · async</text>
  <text x="600.0" y="263.0" text-anchor="middle" font-size="10" fill="#a16207">요청 라우팅 + 백프레셔</text>
  <path d="M 600.0,162 L 600,198" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="150" y="330" width="260" height="170" rx="12" fill="#ffffff"/>
  <rect x="150" y="330" width="260" height="170" rx="12" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="280.0" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#9a3412">LLM Layer</text>
  <text x="280.0" y="380" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">provider abstraction</text>
  <text x="170" y="410" font-size="12" fill="#c2410c">• cache (prompt key)</text>
  <text x="170" y="432" font-size="12" fill="#c2410c">• retry + backoff</text>
  <text x="170" y="454" font-size="12" fill="#c2410c">• circuit breaker</text>
  <text x="170" y="476" font-size="12" fill="#c2410c">• model router</text>
  <rect x="470" y="330" width="260" height="170" rx="12" fill="#ffffff"/>
  <rect x="470" y="330" width="260" height="170" rx="12" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="600.0" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#083344">Retrieval Layer</text>
  <text x="600.0" y="380" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#0e7490">vector + lexical</text>
  <text x="490" y="410" font-size="12" fill="#0e7490">• embedding cache</text>
  <text x="490" y="432" font-size="12" fill="#0e7490">• vector store</text>
  <text x="490" y="454" font-size="12" fill="#0e7490">• reranker</text>
  <text x="490" y="476" font-size="12" fill="#0e7490">• filter (metadata)</text>
  <rect x="790" y="330" width="260" height="170" rx="12" fill="#ffffff"/>
  <rect x="790" y="330" width="260" height="170" rx="12" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="920.0" y="360" text-anchor="middle" font-size="15" font-weight="700" fill="#500724">Session Store</text>
  <text x="920.0" y="380" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">Redis · KV + TTL</text>
  <text x="810" y="410" font-size="12" fill="#be185d">• thread state</text>
  <text x="810" y="432" font-size="12" fill="#be185d">• user prefs</text>
  <text x="810" y="454" font-size="12" fill="#be185d">• rate window</text>
  <text x="810" y="476" font-size="12" fill="#be185d">• idempotency key</text>
  <path d="M 600,272 L 280.0,328" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 600,272 L 600.0,328" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 600,272 L 920.0,328" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="150" y="540" width="900" height="70" rx="12" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="600.0" y="568" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">Observability Bus  ·  trace · log · cost · latency</text>
  <text x="600.0" y="590" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">LangSmith / Langfuse / OpenTelemetry → Ch 27</text>
  <path d="M 280.0,502 L 280.0,538" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <path d="M 600.0,502 L 600.0,538" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <path d="M 920.0,502 L 920.0,538" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
</svg>