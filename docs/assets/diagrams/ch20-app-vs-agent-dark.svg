<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 460" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1120" height="460" fill="#020617"/>
  <rect width="1120" height="460" fill="url(#grid)"/>
  <text x="560" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">LLM App vs Agent — 같은 LLM, 다른 구조</text>
  <text x="560" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">한 번 묻고 끝내면 App. LLM 이 스스로 도구를 골라 루프 돌면 Agent.</text>
  <rect x="40" y="90" width="490" height="330" rx="12" fill="rgba(96,165,250,0.05)" stroke="#60a5fa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="52" y="108" font-size="10" font-weight="700" fill="#60a5fa" font-family="JetBrains Mono, monospace">LLM APP · 단일 호출</text>
  <rect x="590" y="90" width="490" height="330" rx="12" fill="rgba(251,146,60,0.05)" stroke="#fb923c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="602" y="108" font-size="10" font-weight="700" fill="#fb923c" font-family="JetBrains Mono, monospace">AGENT · 루프 + 도구</text>
  <rect x="70" y="230" width="110" height="55" rx="10" fill="#0f172a"/>
  <rect x="70" y="230" width="110" height="55" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="125.0" y="253.5" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">User</text>
  <text x="125.0" y="269.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">질문</text>
  <rect x="220" y="230" width="110" height="55" rx="10" fill="#0f172a"/>
  <rect x="220" y="230" width="110" height="55" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="275.0" y="253.5" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">LLM</text>
  <text x="275.0" y="269.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">단일 호출</text>
  <rect x="380" y="230" width="110" height="55" rx="10" fill="#0f172a"/>
  <rect x="380" y="230" width="110" height="55" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="435.0" y="253.5" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">Output</text>
  <text x="435.0" y="269.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">응답</text>
  <path d="M 182,257.5 L 218,257.5" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 332,257.5 L 378,257.5" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <text x="70" y="320" font-size="12" fill="#60a5fa">• 결정론적 · 1 호출</text>
  <text x="70" y="342" font-size="12" fill="#60a5fa">• 입력 → 출력 선형</text>
  <text x="70" y="364" font-size="12" fill="#60a5fa">• 디버깅 쉬움</text>
  <text x="70" y="386" font-size="12" fill="#60a5fa">• 비용·지연 예측 가능</text>
  <rect x="620" y="210" width="110" height="55" rx="10" fill="#0f172a"/>
  <rect x="620" y="210" width="110" height="55" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="675.0" y="233.5" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">User</text>
  <text x="675.0" y="249.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">질문</text>
  <rect x="790" y="210" width="110" height="85" rx="10" fill="#0f172a"/>
  <rect x="790" y="210" width="110" height="85" rx="10" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="845.0" y="248.5" text-anchor="middle" font-size="14" font-weight="700" fill="#ddd6fe">LLM</text>
  <text x="845.0" y="264.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a78bfa">다음 행동 결정</text>
  <text x="845.0" y="280.5" text-anchor="middle" font-size="10" fill="#a78bfa">thought/tool</text>
  <rect x="960" y="210" width="110" height="85" rx="10" fill="#0f172a"/>
  <rect x="960" y="210" width="110" height="85" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="1015.0" y="248.5" text-anchor="middle" font-size="14" font-weight="700" fill="#a5f3fc">Tool</text>
  <text x="1015.0" y="264.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">실행 결과</text>
  <rect x="790" y="370" width="110" height="55" rx="10" fill="#0f172a"/>
  <rect x="790" y="370" width="110" height="55" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="845.0" y="393.5" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">Output</text>
  <text x="845.0" y="409.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">완료 시</text>
  <path d="M 732,237.5 L 790,252.5" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 902,244.5 L 960,244.5" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="909.0" y="217.5" width="44" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="931.0" y="230.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">call</text>
  <path d="M 960,270.5 L 902,270.5" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <rect x="902.0" y="243.5" width="58" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="931.0" y="256.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">result</text>
  <path d="M 845.0,297 L 845.0,368" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="823.0" y="305.5" width="44" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="845.0" y="318.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">done</text>
  <text x="620" y="400" font-size="12" fill="#fb923c">• LLM 이 루프 제어 · N 호출</text>
  <text x="620" y="422" font-size="12" fill="#fb923c">• 툴 선택·순서를 모델이 결정</text>
  <text x="620" y="444" font-size="12" fill="#fb923c">• 디버깅 어려움 (trace 필수)</text>
  <text x="620" y="466" font-size="12" fill="#fb923c">• 비용·지연 비결정적</text>
  <rect x="40" y="430" width="1040" height="20" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="560.0" y="444" text-anchor="middle" font-size="11" fill="#cbd5e1">결정론적 워크플로우로 풀리면 App. 매번 다른 경로가 필요하면 Agent. 기본은 단일 LLM 로 시작.</text>
</svg>