<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 460" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1120" height="460" fill="#020617"/>
  <rect width="1120" height="460" fill="url(#grid)"/>
  <text x="560" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">LLM-as-a-Judge — Pairwise 비교와 Human Calibration</text>
  <text x="560" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">Judge 점수는 기본 신호일 뿐. 사람 샘플 검수로 주기적 보정한다.</text>
  <path d="M 200,155.0 L 360,240" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 200,245.0 L 360,265.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 200,335.0 L 360,300" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 560,265.0 L 620,265.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="575.0" y="238.0" width="30" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="590.0" y="251.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">판정</text>
  <path d="M 780,265.0 L 870,265.0" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arr-gate)" stroke-dasharray="3,3"/>
  <rect x="796.0" y="238.0" width="58" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="825.0" y="251.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">10% 샘플</text>
  <path d="M 910 320 C 910 420, 460.0 420, 460.0 340" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <rect x="572.0" y="413" width="226" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="685.0" y="426" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">합의율 &lt; 0.8 → 프롬프트·rubric 재튜닝</text>
  <rect x="40" y="120" width="160" height="70" rx="10" fill="#0f172a"/>
  <rect x="40" y="120" width="160" height="70" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="120.0" y="151.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">질문</text>
  <text x="120.0" y="167.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">user</text>
  <rect x="40" y="210" width="160" height="70" rx="10" fill="#0f172a"/>
  <rect x="40" y="210" width="160" height="70" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="120.0" y="241.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">응답 A</text>
  <text x="120.0" y="257.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">model X</text>
  <rect x="40" y="300" width="160" height="70" rx="10" fill="#0f172a"/>
  <rect x="40" y="300" width="160" height="70" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="120.0" y="331.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">응답 B</text>
  <text x="120.0" y="347.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">model Y</text>
  <rect x="360" y="210" width="200" height="110" rx="10" fill="#0f172a"/>
  <rect x="360" y="210" width="200" height="110" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="460.0" y="261.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">Judge LLM</text>
  <text x="460.0" y="277.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">rubric + A·B</text>
  <text x="460.0" y="293.0" text-anchor="middle" font-size="10" fill="#fbbf24">"A 우세 / B 우세 / 무승부"</text>
  <rect x="620" y="210" width="160" height="110" rx="10" fill="#0f172a"/>
  <rect x="620" y="210" width="160" height="110" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="700.0" y="261.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">판정 점수</text>
  <text x="700.0" y="277.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">ratio / score</text>
  <text x="700.0" y="293.0" text-anchor="middle" font-size="10" fill="#34d399">오프라인 지표</text>
  <rect x="870" y="210" width="160" height="110" rx="10" fill="#0f172a"/>
  <rect x="870" y="210" width="160" height="110" rx="10" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="950.0" y="261.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fbcfe8">Human 검수</text>
  <text x="950.0" y="277.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">합의율 계산</text>
  <text x="950.0" y="293.0" text-anchor="middle" font-size="10" fill="#f472b6">κ · agreement</text>
  <rect x="40" y="410" width="1040" height="30" rx="6" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <text x="560.0" y="429" text-anchor="middle" font-size="12" fill="#cbd5e1">A/B 위치를 뒤집어 다시 돌려 위치 편향도 함께 측정. Judge 는 가벼운 Haiku·GPT-4.1-mini 로 시작, 합의율 보고 필요 시 Sonnet 승급.</text>
</svg>