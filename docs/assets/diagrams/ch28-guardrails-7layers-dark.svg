  <text x="744" y="264" font-size="11" font-family="JetBrains Mono, monospace" fill="#f87171">브랜드 · 정책</text>
  <rect x="730" y="290" width="200" height="56" rx="8" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="744" y="314" font-size="13" font-weight="700" fill="#a7f3d0">✓ Final Response</text>
  <text x="744" y="334" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">user-safe</text>
  <rect x="1050" y="280" width="130" height="60" rx="10" fill="#0f172a"/>
  <rect x="1050" y="280" width="130" height="60" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1115.0" y="306.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">Response</text>
  <text x="1115.0" y="322.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">to user</text>
  <path d="M 192,310.0 L 218,310.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 422,310.0 L 538,310.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="451.0" y="283.0" width="58" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="480.0" y="296.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">passed</text>
