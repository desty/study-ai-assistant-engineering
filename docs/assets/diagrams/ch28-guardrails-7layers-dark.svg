  <text x="234" y="144" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">topic classifier</text>
  <rect x="220" y="170" width="200" height="56" rx="8" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
