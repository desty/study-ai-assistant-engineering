  <text x="234" y="284" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">hate · violence</text>
  <rect x="220" y="310" width="200" height="56" rx="8" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="234" y="334" font-size="13" font-weight="700" fill="#a7f3d0">④ Rules</text>
  <text x="234" y="354" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">regex · blocklist</text>
