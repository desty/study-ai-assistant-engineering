  <path d="M 932,310.0 L 1048,310.0" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <text x="320.0" y="86" text-anchor="middle" font-size="11" font-weight="700" fill="#cbd5e1" font-family="JetBrains Mono, monospace">INPUT GUARDRAILS</text>
  <text x="830.0" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#cbd5e1" font-family="JetBrains Mono, monospace">OUTPUT GUARDRAILS</text>
  <rect x="40" y="585" width="1160" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="620.0" y="601" text-anchor="middle" font-size="11" fill="#cbd5e1">위반 시 즉시 차단(reject) · 마스킹(transform) · 사람 승인(escalate) 셋 중 하나로 응답한다.</text>
