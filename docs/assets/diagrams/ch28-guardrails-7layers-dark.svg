  <text x="620.0" y="292" text-anchor="middle" font-size="16" font-weight="700" fill="#fed7aa">Agent</text>
  <text x="620.0" y="316" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">LLM + Tools</text>
  <text x="620.0" y="338" text-anchor="middle" font-size="10" fill="#fb923c">루프 · 툴 선택</text>
  <rect x="545" y="180" width="150" height="60" rx="8" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="620.0" y="204" text-anchor="middle" font-size="13" font-weight="700" fill="#a5f3fc">⑤ Tool Safeguard</text>
  <text x="620.0" y="224" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#22d3ee">low/med/high · 승인</text>
  <path d="M 620.0,242 L 620.0,258" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arr-gate)" stroke-dasharray="3,3"/>
  <rect x="598.0" y="223.0" width="44" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="620.0" y="236.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">gate</text>
  <rect x="730" y="150" width="200" height="56" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
