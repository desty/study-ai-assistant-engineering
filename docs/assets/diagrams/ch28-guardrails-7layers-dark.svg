  <rect width="1240" height="620" fill="#020617"/>
  <rect width="1240" height="620" fill="url(#grid)"/>
  <text x="620" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">가드레일 7종 — 입력 4 + 출력 3 의 계층 방어</text>
  <text x="620" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">하나로는 부족하다. 입력·툴 호출·출력 세 위치에 특화된 필터를 배치해 한 곳이 뚫려도 다음이 잡는다.</text>
  <rect x="220" y="100" width="200" height="56" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
