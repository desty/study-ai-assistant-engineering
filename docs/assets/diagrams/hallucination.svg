<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 240" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="900" height="240" fill="#ffffff"/>
  <rect width="900" height="240" fill="url(#grid)"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">hallucination이 생기는 순간</text>
  <path d="M 302,140 L 328,140" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 572,140 L 598,140" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="60" y="80" width="240" height="120" rx="10" fill="#ffffff"/>
  <rect x="60" y="80" width="240" height="120" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="180.0" y="136.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">질문</text>
  <text x="180.0" y="152.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">user</text>
  <text x="180.0" y="168.0" text-anchor="middle" font-size="10" fill="#1e40af">'발명가 홍길동의 대표 특허는?'</text>
  <rect x="330" y="80" width="240" height="120" rx="10" fill="#ffffff"/>
  <rect x="330" y="80" width="240" height="120" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="450.0" y="136.0" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">내부 상태</text>
  <text x="450.0" y="152.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">reasoning</text>
  <text x="450.0" y="168.0" text-anchor="middle" font-size="10" fill="#6d28d9">'발명가+특허'에 맞을 것만 조합</text>
  <rect x="600" y="80" width="240" height="120" rx="10" fill="#ffffff"/>
  <rect x="600" y="80" width="240" height="120" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="720.0" y="136.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">확신 오답</text>
  <text x="720.0" y="152.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#b91c1c">hallucination</text>
  <text x="720.0" y="168.0" text-anchor="middle" font-size="10" fill="#b91c1c">그럴듯한 특허명 창작</text>
</svg>