  <rect width="1100" height="460" fill="#020617"/>
  <rect width="1100" height="460" fill="url(#grid)"/>
  <text x="550" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">어느 패턴을 쓸까 — 결정 질문</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">위에서 아래로 질문을 따라가세요. 단순한 것부터 검토.</text>
  <rect x="370" y="90" width="360" height="42" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="550.0" y="115.0" text-anchor="middle" font-size="12" font-weight="700" fill="#fde68a">단일 LLM + RAG 로 풀리나?</text>
