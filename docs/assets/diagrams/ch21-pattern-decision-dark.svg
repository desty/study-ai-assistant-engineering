  <rect x="760" y="222" width="200" height="42" rx="8" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.2"/>
  <text x="860.0" y="247.0" text-anchor="middle" font-size="12" font-weight="700" fill="#a7f3d0">③ Parallelization</text>
