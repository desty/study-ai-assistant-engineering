  <rect x="535.0" y="282.0" width="30" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="550.0" y="295.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">NO</text>
  <rect x="370" y="310" width="360" height="42" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="550.0" y="335.0" text-anchor="middle" font-size="12" font-weight="700" fill="#fde68a">플래너가 서브태스크 쪼갬?</text>
  <rect x="760" y="310" width="200" height="42" rx="8" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.2"/>
  <text x="860.0" y="335.0" text-anchor="middle" font-size="12" font-weight="700" fill="#ddd6fe">④ Orchestrator-Workers</text>
  <path d="M 732,331.0 L 758,331.0" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="726.5" y="304.0" width="37" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="745.0" y="317.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">YES</text>
  <path d="M 550.0,354 L 550.0,352" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="535.0" y="326.0" width="30" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="550.0" y="339.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">NO</text>
  <rect x="370" y="354" width="360" height="42" rx="8" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.2"/>
  <text x="550.0" y="379.0" text-anchor="middle" font-size="12" font-weight="700" fill="#fde68a">LLM 이 루프 내 툴 선택?</text>
  <rect x="760" y="354" width="200" height="42" rx="8" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.2"/>
  <text x="860.0" y="379.0" text-anchor="middle" font-size="12" font-weight="700" fill="#fed7aa">⑥ Single Agent</text>
  <path d="M 732,375.0 L 758,375.0" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="726.5" y="348.0" width="37" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="745.0" y="361.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">YES</text>
  <rect x="450.0" y="398" width="200" height="42" rx="8" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.2"/>
  <text x="550.0" y="423.0" text-anchor="middle" font-size="12" font-weight="700" fill="#fed7aa">⑦ Multi-Agent</text>
  <text x="40" y="120" font-size="11" font-weight="700" fill="#f1f5f9">원칙</text>
  <text x="40" y="140" font-size="11" fill="#cbd5e1">• 위에서 아래로</text>
  <text x="40" y="158" font-size="11" fill="#cbd5e1">• 가장 단순한 답 먼저</text>
  <text x="40" y="176" font-size="11" fill="#cbd5e1">• ⓪ 에서 멈추는 게</text>
  <text x="40" y="194" font-size="11" fill="#cbd5e1">• 80% 의 경우</text>
  <text x="40" y="212" font-size="11" fill="#cbd5e1">• 정답</text>
