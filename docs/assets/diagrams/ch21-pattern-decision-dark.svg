  <rect x="726.5" y="216.0" width="37" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="745.0" y="229.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">YES</text>
  <path d="M 550.0,266 L 550.0,264" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="535.0" y="238.0" width="30" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
