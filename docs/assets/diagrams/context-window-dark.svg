  <path d="M 552,150 L 570,150" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 714,150 L 732,150" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
