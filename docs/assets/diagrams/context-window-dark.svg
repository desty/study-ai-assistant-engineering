  <text x="642.0" y="174.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">user</text>
  <rect x="734" y="110" width="140" height="105" rx="10" fill="#0f172a"/>
  <rect x="734" y="110" width="140" height="105" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
