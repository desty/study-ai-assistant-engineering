  <text x="318.0" y="158.5" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">시스템 프롬프트</text>
  <text x="318.0" y="174.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">system</text>
  <rect x="410" y="110" width="140" height="105" rx="10" fill="#0f172a"/>
