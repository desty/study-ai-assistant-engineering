<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 320" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1000" height="320" fill="#020617"/>
  <rect width="1000" height="320" fill="url(#grid)"/>
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">툴의 3가지 종류 (OpenAI Practical Guide)</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">무슨 일을 하느냐로 분류 · 안전성 관점이 다름</text>
  <path d="M 332,180 L 358,180" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 642,180 L 668,180" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="50" y="110" width="280" height="140" rx="10" fill="#0f172a"/>
  <rect x="50" y="110" width="280" height="140" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="190.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a5f3fc">Data</text>
  <text x="190.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">retrieve</text>
  <text x="190.0" y="208.0" text-anchor="middle" font-size="10" fill="#22d3ee">컨텍스트 조회 (읽기)</text>
  <rect x="360" y="110" width="280" height="140" rx="10" fill="#0f172a"/>
  <rect x="360" y="110" width="280" height="140" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="500.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fed7aa">Action</text>
  <text x="500.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">mutate</text>
  <text x="500.0" y="208.0" text-anchor="middle" font-size="10" fill="#fb923c">상태 변경 (쓰기·결제·발송)</text>
  <rect x="670" y="110" width="280" height="140" rx="10" fill="#0f172a"/>
  <rect x="670" y="110" width="280" height="140" rx="10" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="810.0" y="176.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fbcfe8">Orchestration</text>
  <text x="810.0" y="192.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">sub-agent</text>
  <text x="810.0" y="208.0" text-anchor="middle" font-size="10" fill="#f472b6">다른 에이전트/툴 조합</text>
</svg>