<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="900" height="300" fill="#ffffff"/>
  <rect width="900" height="300" fill="url(#grid)"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">결정 흐름</text>
  <path d="M 180,150 L 270,150" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 410,150 L 540,100" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="456.5" y="98.0" width="37" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="475.0" y="111.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">Yes</text>
  <path d="M 410,150 L 540,200" stroke="#ca8a04" stroke-width="1.5" fill="none" marker-end="url(#arr-gate)" stroke-dasharray="3,3"/>
  <rect x="460.0" y="148.0" width="30" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="475.0" y="161.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">No</text>
  <rect x="40" y="110" width="140" height="80" rx="10" fill="#ffffff"/>
  <rect x="40" y="110" width="140" height="80" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="110.0" y="146.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">새 기능</text>
  <text x="110.0" y="162.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">problem</text>
  <rect x="270" y="110" width="140" height="80" rx="10" fill="#ffffff"/>
  <rect x="270" y="110" width="140" height="80" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="340.0" y="146.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">3조건 체크</text>
  <text x="340.0" y="162.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">decision</text>
  <rect x="540" y="60" width="140" height="80" rx="10" fill="#ffffff"/>
  <rect x="540" y="60" width="140" height="80" rx="10" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="610.0" y="96.0" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">모델</text>
  <text x="610.0" y="112.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">Prompt → RAG → Agent</text>
  <rect x="540" y="160" width="140" height="80" rx="10" fill="#ffffff"/>
  <rect x="540" y="160" width="140" height="80" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="610.0" y="196.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">코드</text>
  <text x="610.0" y="212.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">deterministic</text>
</svg>