<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="900" height="300" fill="#020617"/>
  <rect width="900" height="300" fill="url(#grid)"/>
  <text x="450" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">결정 흐름</text>
  <path d="M 180,150 L 270,150" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 410,150 L 540,100" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="456.5" y="98.0" width="37" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="475.0" y="111.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">Yes</text>
  <path d="M 410,150 L 540,200" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arr-gate)" stroke-dasharray="3,3"/>
  <rect x="460.0" y="148.0" width="30" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="475.0" y="161.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">No</text>
  <rect x="40" y="110" width="140" height="80" rx="10" fill="#0f172a"/>
  <rect x="40" y="110" width="140" height="80" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="110.0" y="146.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">새 기능</text>
  <text x="110.0" y="162.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">problem</text>
  <rect x="270" y="110" width="140" height="80" rx="10" fill="#0f172a"/>
  <rect x="270" y="110" width="140" height="80" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="340.0" y="146.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">3조건 체크</text>
  <text x="340.0" y="162.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">decision</text>
  <rect x="540" y="60" width="140" height="80" rx="10" fill="#0f172a"/>
  <rect x="540" y="60" width="140" height="80" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="610.0" y="96.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fed7aa">모델</text>
  <text x="610.0" y="112.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">Prompt → RAG → Agent</text>
  <rect x="540" y="160" width="140" height="80" rx="10" fill="#0f172a"/>
  <rect x="540" y="160" width="140" height="80" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="610.0" y="196.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">코드</text>
  <text x="610.0" y="212.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">deterministic</text>
</svg>