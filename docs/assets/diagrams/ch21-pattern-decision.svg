  <rect x="726.5" y="172.0" width="37" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="745.0" y="185.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">YES</text>
