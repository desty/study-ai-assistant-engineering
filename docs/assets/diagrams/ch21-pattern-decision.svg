  <rect width="1100" height="460" fill="#ffffff"/>
  <rect width="1100" height="460" fill="url(#grid)"/>
  <text x="550" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">어느 패턴을 쓸까 — 결정 질문</text>
  <text x="550" y="58" text-anchor="middle" font-size="12" fill="#64748b">위에서 아래로 질문을 따라가세요. 단순한 것부터 검토.</text>
  <rect x="370" y="90" width="360" height="42" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="550.0" y="115.0" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">단일 LLM + RAG 로 풀리나?</text>
  <rect x="760" y="90" width="200" height="42" rx="8" fill="#d1fae5" stroke="#059669" stroke-width="1.2"/>
  <text x="860.0" y="115.0" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">⓪ Baseline 사용</text>
