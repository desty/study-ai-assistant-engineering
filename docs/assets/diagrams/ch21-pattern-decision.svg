  <text x="550.0" y="119.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">NO</text>
  <rect x="370" y="134" width="360" height="42" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="550.0" y="159.0" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">입력 유형별 분기만 필요?</text>
