  <rect x="760" y="222" width="200" height="42" rx="8" fill="#dcfce7" stroke="#059669" stroke-width="1.2"/>
  <text x="860.0" y="247.0" text-anchor="middle" font-size="12" font-weight="700" fill="#064e3b">③ Parallelization</text>
  <path d="M 732,243.0 L 758,243.0" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="726.5" y="216.0" width="37" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="745.0" y="229.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">YES</text>
  <path d="M 550.0,266 L 550.0,264" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="535.0" y="238.0" width="30" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="550.0" y="251.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">NO</text>
  <rect x="370" y="266" width="360" height="42" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="550.0" y="291.0" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">생성 → 평가 → 재생성?</text>
  <rect x="760" y="266" width="200" height="42" rx="8" fill="#fce7f3" stroke="#db2777" stroke-width="1.2"/>
  <text x="860.0" y="291.0" text-anchor="middle" font-size="12" font-weight="700" fill="#500724">⑤ Evaluator-Optimizer</text>
  <path d="M 732,287.0 L 758,287.0" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="726.5" y="260.0" width="37" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="745.0" y="273.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">YES</text>
  <path d="M 550.0,310 L 550.0,308" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="535.0" y="282.0" width="30" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="550.0" y="295.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">NO</text>
  <rect x="370" y="310" width="360" height="42" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="550.0" y="335.0" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">플래너가 서브태스크 쪼갬?</text>
  <rect x="760" y="310" width="200" height="42" rx="8" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.2"/>
  <text x="860.0" y="335.0" text-anchor="middle" font-size="12" font-weight="700" fill="#4c1d95">④ Orchestrator-Workers</text>
  <path d="M 732,331.0 L 758,331.0" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="726.5" y="304.0" width="37" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="745.0" y="317.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">YES</text>
  <path d="M 550.0,354 L 550.0,352" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="535.0" y="326.0" width="30" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="550.0" y="339.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">NO</text>
  <rect x="370" y="354" width="360" height="42" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.2"/>
  <text x="550.0" y="379.0" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">LLM 이 루프 내 툴 선택?</text>
  <rect x="760" y="354" width="200" height="42" rx="8" fill="#fef3e0" stroke="#ea580c" stroke-width="1.2"/>
  <text x="860.0" y="379.0" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">⑥ Single Agent</text>
  <path d="M 732,375.0 L 758,375.0" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="726.5" y="348.0" width="37" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="745.0" y="361.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">YES</text>
  <rect x="450.0" y="398" width="200" height="42" rx="8" fill="#fef3e0" stroke="#ea580c" stroke-width="1.2"/>
  <text x="550.0" y="423.0" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">⑦ Multi-Agent</text>
  <text x="40" y="120" font-size="11" font-weight="700" fill="#0f172a">원칙</text>
  <text x="40" y="140" font-size="11" fill="#334155">• 위에서 아래로</text>
  <text x="40" y="158" font-size="11" fill="#334155">• 가장 단순한 답 먼저</text>
  <text x="40" y="176" font-size="11" fill="#334155">• ⓪ 에서 멈추는 게</text>
  <text x="40" y="194" font-size="11" fill="#334155">• 80% 의 경우</text>
  <text x="40" y="212" font-size="11" fill="#334155">• 정답</text>
