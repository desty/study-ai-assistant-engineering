<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1040 400" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="1040" height="400" fill="#ffffff"/>
  <rect width="1040" height="400" fill="url(#grid)"/>
  <text x="520" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">LLM 단독 vs LLM + RAG</text>
  <text x="520" y="58" text-anchor="middle" font-size="12" fill="#64748b">같은 질문, 다른 근거 — "환불 정책이 어떻게 되나요?"</text>
  <path d="M 180,225 L 320,145" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="235.0" y="158.0" width="30" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="250.0" y="171.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">직접</text>
  <path d="M 460,145 L 640,145" stroke="#ca8a04" stroke-width="1.5" fill="none" marker-end="url(#arr-gate)" stroke-dasharray="3,3"/>
  <path d="M 180,265 L 320,335" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="228.0" y="273.0" width="44" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="250.0" y="286.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">+RAG</text>
  <path d="M 460,335 L 540,335" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="485.0" y="308.0" width="30" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="500.0" y="321.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">문서</text>
  <path d="M 680,335 L 760,335" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="40" y="200" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="40" y="200" width="140" height="90" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="110.0" y="241.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">질문</text>
  <text x="110.0" y="257.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">user</text>
  <rect x="320" y="100" width="140" height="110" rx="10" fill="#ffffff"/>
  <rect x="320" y="100" width="140" height="110" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="390.0" y="151.0" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">LLM</text>
  <text x="390.0" y="167.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">학습 지식만</text>
  <text x="390.0" y="183.0" text-anchor="middle" font-size="10" fill="#6d28d9">hallucination 위험</text>
  <rect x="640" y="100" width="140" height="110" rx="10" fill="#ffffff"/>
  <rect x="640" y="100" width="140" height="110" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="710.0" y="151.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">답</text>
  <text x="710.0" y="167.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#b91c1c">출처 없음</text>
  <text x="710.0" y="183.0" text-anchor="middle" font-size="10" fill="#b91c1c">그럴듯한 추측</text>
  <rect x="320" y="290" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="320" y="290" width="140" height="90" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="390.0" y="331.0" text-anchor="middle" font-size="14" font-weight="700" fill="#083344">검색</text>
  <text x="390.0" y="347.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#0e7490">vector DB</text>
  <rect x="540" y="290" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="540" y="290" width="140" height="90" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="610.0" y="331.0" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">LLM</text>
  <text x="610.0" y="347.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">+ 검색 문서</text>
  <rect x="760" y="290" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="760" y="290" width="140" height="90" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="830.0" y="331.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">답</text>
  <text x="830.0" y="347.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">출처 포함</text>
</svg>