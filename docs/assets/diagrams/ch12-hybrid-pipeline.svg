  <text x="790.0" y="257.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">cross-encoder</text>
  <rect x="940" y="200" width="140" height="90" rx="10" fill="#ffffff"/>
