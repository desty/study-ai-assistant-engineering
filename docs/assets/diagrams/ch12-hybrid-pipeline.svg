  <rect x="421.0" y="275.5" width="58" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="450.0" y="288.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">top-20</text>
