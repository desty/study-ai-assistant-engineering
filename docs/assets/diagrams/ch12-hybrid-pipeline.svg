  <text x="110.0" y="257.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">user query</text>
  <rect x="260" y="110" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="260" y="110" width="140" height="90" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="330.0" y="151.0" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">Dense</text>
