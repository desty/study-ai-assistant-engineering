  <text x="620" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">가드레일 7종 — 입력 4 + 출력 3 의 계층 방어</text>
  <text x="620" y="58" text-anchor="middle" font-size="12" fill="#64748b">하나로는 부족하다. 입력·툴 호출·출력 세 위치에 특화된 필터를 배치해 한 곳이 뚫려도 다음이 잡는다.</text>
