  <text x="390.0" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">Classify</text>
  <text x="390.0" y="242" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">5 택소노미</text>
