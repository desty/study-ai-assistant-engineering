  <text x="630.0" y="242" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">root cause 수정</text>
  <text x="630.0" y="256" text-anchor="middle" font-size="10" fill="#1e40af">한 층만 · 측정 가능</text>
  <rect x="780" y="170" width="180" height="115" rx="10" fill="#ffffff"/>
