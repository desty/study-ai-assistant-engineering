  <rect x="40" y="505" width="1160" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="620.0" y="521" text-anchor="middle" font-size="11" fill="#cbd5e1">우리 첫 시도는 SFT. 거절 톤·정렬이 SFT 천장에 부딪히면 DPO. RLHF 는 안 가도 됨.</text>
