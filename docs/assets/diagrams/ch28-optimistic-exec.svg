<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 460" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="1180" height="460" fill="#ffffff"/>
  <rect width="1180" height="460" fill="url(#grid)"/>
  <text x="590" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Optimistic Execution — 가드레일은 LLM 과 병렬</text>
  <text x="590" y="58" text-anchor="middle" font-size="12" fill="#64748b">직렬로 깔면 가드레일 추가할 때마다 지연이 누적된다. 병렬로 돌리고 위반 시 abort.</text>
  <text x="80" y="96" font-size="13" font-weight="700" fill="#0f172a">직렬 (느림)</text>
  <rect x="80" y="120" width="180" height="40" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="170.0" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">Input GR</text>
  <text x="170.0" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a16207">40ms</text>
  <rect x="266" y="120" width="180" height="40" rx="6" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="356.0" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">LLM</text>
  <text x="356.0" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#c2410c">2400ms</text>
  <rect x="452" y="120" width="180" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="542.0" y="138" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Output GR</text>
  <text x="542.0" y="152" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#b91c1c">60ms</text>
  <line x1="80" y1="172" x2="632" y2="172" stroke="#4b5563" stroke-width="1.5"/>
  <text x="356.0" y="188" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#334155">총 ≈ 2500ms</text>
  <text x="80" y="266" font-size="13" font-weight="700" fill="#0f172a">병렬 · Optimistic (빠름)</text>
  <rect x="80" y="290" width="360" height="40" rx="6" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="260.0" y="308" text-anchor="middle" font-size="12" font-weight="700" fill="#9a3412">LLM</text>
  <text x="260.0" y="322" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#c2410c">2400ms</text>
  <rect x="80" y="244" width="80" height="40" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="120.0" y="262" text-anchor="middle" font-size="12" font-weight="700" fill="#713f12">Input GR</text>
  <text x="120.0" y="276" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#a16207">40ms</text>
  <rect x="340" y="336" width="100" height="40" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="390.0" y="354" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">Output GR</text>
  <text x="390.0" y="368" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#b91c1c">streaming</text>
  <line x1="310" y1="234" x2="310" y2="386" stroke="#dc2626" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="318" y="230" font-size="11" font-weight="700" fill="#7f1d1d">위반 감지 시 즉시 abort</text>
  <line x1="80" y1="390" x2="440" y2="390" stroke="#4b5563" stroke-width="1.5"/>
  <text x="260.0" y="406" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#334155">총 ≈ 2400ms (지연 0 추가)</text>
  <rect x="500" y="120" width="360" height="280" rx="10" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="516" y="144" font-size="13" font-weight="700" fill="#0f172a">Optimistic 의 핵심</text>
  <text x="516" y="176" font-size="12" fill="#334155">① LLM 호출과 가드레일을 동시 시작</text>
  <text x="516" y="202" font-size="12" fill="#334155">② 위반 감지 시 LLM 응답 폐기</text>
  <text x="516" y="228" font-size="12" fill="#334155">③ 사용자 보지 못함 (스트리밍이면 차단)</text>
  <text x="516" y="254" font-size="12" fill="#334155">④ 정상 케이스 지연 0 추가</text>
  <text x="516" y="280" font-size="12" fill="#334155"></text>
  <text x="516" y="306" font-size="12" fill="#334155">단, 안전·PII 같은 hard fail 은</text>
  <text x="516" y="332" font-size="12" fill="#334155">입력 단계에서 직렬 검사 후 통과시킨다.</text>
  <text x="516" y="358" font-size="12" fill="#334155">"빠르지만 위험한 토큰" 을 흘리지 않기 위함.</text>
</svg>