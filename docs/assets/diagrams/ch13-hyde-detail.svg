  <text x="520" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">HyDE — Hypothetical Document Embeddings</text>
  <text x="520" y="58" text-anchor="middle" font-size="12" fill="#64748b">쿼리 임베딩이 약할 때, 가상의 답변을 만들어 그걸로 검색</text>
  <text x="60" y="110" font-size="12" font-weight="700" fill="#dc2626">❌ Basic</text>
  <text x="60" y="128" font-size="10" fill="#64748b" font-family="JetBrains Mono, monospace">query embed</text>
