<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 420" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1080" height="420" fill="#020617"/>
  <rect width="1080" height="420" fill="url(#grid)"/>
  <text x="540" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">자율성 스펙트럼 — Agent 는 단일 용어가 아니다</text>
  <text x="540" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">왼쪽으로 갈수록 제어·예측 가능 · 오른쪽으로 갈수록 자율적·복잡</text>
  <rect x="75" y="110" width="210" height="180" rx="12" fill="#0f172a"/>
  <rect x="75" y="110" width="210" height="180" rx="12" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="180.0" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#bfdbfe">① Rule-based</text>
  <text x="180.0" y="164" text-anchor="middle" font-size="12" font-family="JetBrains Mono, monospace" fill="#60a5fa">if-else · 스크립트</text>
  <text x="95" y="202" font-size="11" fill="#60a5fa">• 완전 결정론</text>
  <text x="95" y="224" font-size="11" fill="#60a5fa">• 변경=코드 변경</text>
  <text x="95" y="246" font-size="11" fill="#60a5fa">• 디버깅 최강</text>
  <rect x="315" y="110" width="210" height="180" rx="12" fill="#0f172a"/>
  <rect x="315" y="110" width="210" height="180" rx="12" fill="rgba(167,139,250,0.15)" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="420.0" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#ddd6fe">② LLM Call</text>
  <text x="420.0" y="164" text-anchor="middle" font-size="12" font-family="JetBrains Mono, monospace" fill="#a78bfa">단일 호출 · RAG</text>
  <text x="335" y="202" font-size="11" fill="#a78bfa">• 프롬프트 = 로직</text>
  <text x="335" y="224" font-size="11" fill="#a78bfa">• 결과 확률적</text>
  <text x="335" y="246" font-size="11" fill="#a78bfa">• Ch 4 ~ 14</text>
  <rect x="555" y="110" width="210" height="180" rx="12" fill="#0f172a"/>
  <rect x="555" y="110" width="210" height="180" rx="12" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="660.0" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#fde68a">③ Workflow</text>
  <text x="660.0" y="164" text-anchor="middle" font-size="12" font-family="JetBrains Mono, monospace" fill="#fbbf24">LLM + 정해진 경로</text>
  <text x="575" y="202" font-size="11" fill="#fbbf24">• 개발자가 단계 지정</text>
  <text x="575" y="224" font-size="11" fill="#fbbf24">• routing · chaining</text>
  <text x="575" y="246" font-size="11" fill="#fbbf24">• Ch 21 패턴</text>
  <rect x="795" y="110" width="210" height="180" rx="12" fill="#0f172a"/>
  <rect x="795" y="110" width="210" height="180" rx="12" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="900.0" y="142" text-anchor="middle" font-size="15" font-weight="700" fill="#fed7aa">④ Agent</text>
  <text x="900.0" y="164" text-anchor="middle" font-size="12" font-family="JetBrains Mono, monospace" fill="#fb923c">LLM 이 경로 결정</text>
  <text x="815" y="202" font-size="11" fill="#fb923c">• while loop · tool use</text>
  <text x="815" y="224" font-size="11" fill="#fb923c">• ReAct · planner</text>
  <text x="815" y="246" font-size="11" fill="#fb923c">• 예측 불가 · 비용↑</text>
  <line x1="75" y1="330" x2="1005" y2="330" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="75" y="350" font-size="12" font-weight="700" fill="#f1f5f9">통제·예측 가능</text>
  <text x="1005" y="350" text-anchor="end" font-size="12" font-weight="700" fill="#f1f5f9">자율성·복잡성</text>
  <text x="540.0" y="375" text-anchor="middle" font-size="11" fill="#cbd5e1">대부분 제품은 ②③ 로 충분. ④ 를 선택하기 전, 문제가 정말 비결정적인지 먼저 묻는다.</text>
</svg>