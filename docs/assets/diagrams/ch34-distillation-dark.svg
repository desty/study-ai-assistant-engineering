<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 480" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1180" height="480" fill="#020617"/>
  <rect width="1180" height="480" fill="url(#grid)"/>
  <text x="590" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">증류 (Distillation) — 큰 모델로 작은 모델 가르치기</text>
  <text x="590" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">Teacher (Opus) 가 만든 답을 Student (Haiku) 가 학습. 비용·지연 절감 + 도메인 특화.</text>
  <rect x="60" y="200" width="160" height="80" rx="10" fill="#0f172a"/>
  <rect x="60" y="200" width="160" height="80" rx="10" fill="rgba(96,165,250,0.15)" stroke="#60a5fa" stroke-width="1.5"/>
  <text x="140.0" y="236.0" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">Unlabeled Q</text>
  <text x="140.0" y="252.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">log · 합성</text>
  <text x="140.0" y="268.0" text-anchor="middle" font-size="10" fill="#60a5fa">수K~수만</text>
  <rect x="280" y="130" width="200" height="140" rx="14" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="2.5"/>
  <text x="380.0" y="166" text-anchor="middle" font-size="16" font-weight="700" fill="#fed7aa">Teacher</text>
  <text x="380.0" y="190" text-anchor="middle" font-size="13" font-family="JetBrains Mono, monospace" fill="#fb923c">Opus / GPT-4</text>
  <text x="380.0" y="216" text-anchor="middle" font-size="11" fill="#fb923c">정확 · 비싸 · 느림</text>
  <text x="380.0" y="240" text-anchor="middle" font-size="11" fill="#fb923c">$0.030/req</text>
  <rect x="540" y="200" width="160" height="80" rx="10" fill="#0f172a"/>
  <rect x="540" y="200" width="160" height="80" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="620.0" y="236.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">(q, a*) Dataset</text>
  <text x="620.0" y="252.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">Teacher 답을 정답으로</text>
  <text x="620.0" y="268.0" text-anchor="middle" font-size="10" fill="#34d399">필터링·검증 필수</text>
  <rect x="760" y="130" width="160" height="140" rx="14" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="2.5"/>
  <text x="840.0" y="166" text-anchor="middle" font-size="16" font-weight="700" fill="#a7f3d0">Student</text>
  <text x="840.0" y="190" text-anchor="middle" font-size="13" font-family="JetBrains Mono, monospace" fill="#34d399">Haiku / 8B</text>
  <text x="840.0" y="216" text-anchor="middle" font-size="11" fill="#34d399">SFT · LoRA</text>
  <text x="840.0" y="240" text-anchor="middle" font-size="11" fill="#34d399">$0.001/req</text>
  <rect x="980" y="200" width="160" height="80" rx="10" fill="#0f172a"/>
  <rect x="980" y="200" width="160" height="80" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1060.0" y="236.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">Deploy</text>
  <text x="1060.0" y="252.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">30× 저렴</text>
  <text x="1060.0" y="268.0" text-anchor="middle" font-size="10" fill="#fbbf24">도메인 특화</text>
  <path d="M 222,240.0 L 278,200.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 482,200.0 L 538,240.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="474.0" y="193.0" width="72" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="510.0" y="206.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">generate</text>
  <path d="M 702,240.0 L 758,200.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="704.5" y="193.0" width="51" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="730.0" y="206.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">train</text>
  <path d="M 922,200.0 L 978,240.0" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <text x="510.0" y="188" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fecaca">+ 필터 (judge · 규칙)</text>
  <rect x="40" y="445" width="1100" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="590.0" y="461" text-anchor="middle" font-size="11" fill="#cbd5e1">Teacher 의 편향·할루시 그대로 복제 위험. 필터링이 학습보다 중요.</text>
</svg>