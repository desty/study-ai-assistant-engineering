<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 460" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#f1f5f9" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#6b7280"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#2563eb"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ea580c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#7c3aed"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#059669"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#ca8a04"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#0891b2"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#db2777"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#dc2626"/></marker>
  </defs>
  <rect width="1120" height="460" fill="#ffffff"/>
  <rect width="1120" height="460" fill="url(#grid)"/>
  <text x="560" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">LLM App vs Agent — 같은 LLM, 다른 구조</text>
  <text x="560" y="58" text-anchor="middle" font-size="12" fill="#64748b">한 번 묻고 끝내면 App. LLM 이 스스로 도구를 골라 루프 돌면 Agent.</text>
  <rect x="40" y="90" width="490" height="330" rx="12" fill="rgba(37,99,235,0.04)" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="52" y="108" font-size="10" font-weight="700" fill="#2563eb" font-family="JetBrains Mono, monospace">LLM APP · 단일 호출</text>
  <rect x="590" y="90" width="490" height="330" rx="12" fill="rgba(234,88,12,0.04)" stroke="#ea580c" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="602" y="108" font-size="10" font-weight="700" fill="#ea580c" font-family="JetBrains Mono, monospace">AGENT · 루프 + 도구</text>
  <rect x="70" y="230" width="110" height="55" rx="10" fill="#ffffff"/>
  <rect x="70" y="230" width="110" height="55" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="125.0" y="253.5" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">User</text>
  <text x="125.0" y="269.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">질문</text>
  <rect x="220" y="230" width="110" height="55" rx="10" fill="#ffffff"/>
  <rect x="220" y="230" width="110" height="55" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="275.0" y="253.5" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">LLM</text>
  <text x="275.0" y="269.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">단일 호출</text>
  <rect x="380" y="230" width="110" height="55" rx="10" fill="#ffffff"/>
  <rect x="380" y="230" width="110" height="55" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="435.0" y="253.5" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">Output</text>
  <text x="435.0" y="269.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">응답</text>
  <path d="M 182,257.5 L 218,257.5" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 332,257.5 L 378,257.5" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <text x="70" y="320" font-size="12" fill="#1e40af">• 결정론적 · 1 호출</text>
  <text x="70" y="342" font-size="12" fill="#1e40af">• 입력 → 출력 선형</text>
  <text x="70" y="364" font-size="12" fill="#1e40af">• 디버깅 쉬움</text>
  <text x="70" y="386" font-size="12" fill="#1e40af">• 비용·지연 예측 가능</text>
  <rect x="620" y="210" width="110" height="55" rx="10" fill="#ffffff"/>
  <rect x="620" y="210" width="110" height="55" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="675.0" y="233.5" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">User</text>
  <text x="675.0" y="249.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">질문</text>
  <rect x="790" y="210" width="110" height="85" rx="10" fill="#ffffff"/>
  <rect x="790" y="210" width="110" height="85" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="845.0" y="248.5" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">LLM</text>
  <text x="845.0" y="264.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">다음 행동 결정</text>
  <text x="845.0" y="280.5" text-anchor="middle" font-size="10" fill="#6d28d9">thought/tool</text>
  <rect x="960" y="210" width="110" height="85" rx="10" fill="#ffffff"/>
  <rect x="960" y="210" width="110" height="85" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="1015.0" y="248.5" text-anchor="middle" font-size="14" font-weight="700" fill="#083344">Tool</text>
  <text x="1015.0" y="264.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#0e7490">실행 결과</text>
  <rect x="790" y="370" width="110" height="55" rx="10" fill="#ffffff"/>
  <rect x="790" y="370" width="110" height="55" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="845.0" y="393.5" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">Output</text>
  <text x="845.0" y="409.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">완료 시</text>
  <path d="M 732,237.5 L 790,252.5" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 902,244.5 L 960,244.5" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="909.0" y="217.5" width="44" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="931.0" y="230.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">call</text>
  <path d="M 960,270.5 L 902,270.5" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <rect x="902.0" y="243.5" width="58" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="931.0" y="256.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">result</text>
  <path d="M 845.0,297 L 845.0,368" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="823.0" y="305.5" width="44" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="845.0" y="318.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">done</text>
  <text x="620" y="400" font-size="12" fill="#c2410c">• LLM 이 루프 제어 · N 호출</text>
  <text x="620" y="422" font-size="12" fill="#c2410c">• 툴 선택·순서를 모델이 결정</text>
  <text x="620" y="444" font-size="12" fill="#c2410c">• 디버깅 어려움 (trace 필수)</text>
  <text x="620" y="466" font-size="12" fill="#c2410c">• 비용·지연 비결정적</text>
  <rect x="40" y="430" width="1040" height="20" rx="4" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="560.0" y="444" text-anchor="middle" font-size="11" fill="#334155">결정론적 워크플로우로 풀리면 App. 매번 다른 경로가 필요하면 Agent. 기본은 단일 LLM 로 시작.</text>
</svg>