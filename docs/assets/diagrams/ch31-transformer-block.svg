  <rect x="920" y="380" width="160" height="56" rx="10" fill="#ffffff"/>
  <rect x="920" y="380" width="160" height="56" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="1000.0" y="404.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">Sample / argmax</text>
  <text x="1000.0" y="420.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">다음 토큰 결정</text>
  <path d="M 1000.0,258 L 1000.0,288" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 1000.0,348 L 1000.0,378" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 222,318.0 L 324,280.0" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="244.0" y="272.0" width="58" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="273.0" y="285.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">hidden</text>
  <path d="M 862,280.0 L 918,228.0" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="861.0" y="227.0" width="58" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="890.0" y="240.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">hidden</text>
  <rect x="40" y="540" width="1100" height="44" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="0.8"/>
  <text x="590.0" y="562" text-anchor="middle" font-size="12" fill="#334155">d_model · n_heads · n_layers · vocab_size 가 모델 크기를 결정. Llama-3-8B ≈ d=4096 · h=32 · L=32 · V=128k.</text>
  <text x="590.0" y="580" text-anchor="middle" font-size="11" fill="#334155">MoE 는 FFN 자리에 여러 expert 중 일부만 활성. attention 은 그대로.</text>
</svg>