  <rect width="1180" height="600" fill="#ffffff"/>
  <rect width="1180" height="600" fill="url(#grid)"/>
  <text x="590" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Transformer 블록 — 단순화 해부도</text>
  <text x="590" y="58" text-anchor="middle" font-size="12" fill="#64748b">입력 토큰이 임베딩 → N개 블록(self-attention + FFN) → 다음 토큰 분포로 변환된다.</text>
  <rect x="60" y="110" width="160" height="56" rx="10" fill="#ffffff"/>
  <rect x="60" y="110" width="160" height="56" rx="10" fill="#e3f2fd" stroke="#2563eb" stroke-width="1.5"/>
  <text x="140.0" y="134.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">Tokens</text>
  <text x="140.0" y="150.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">"안녕 세계" → [101, 5023, ...]</text>
  <rect x="60" y="200" width="160" height="56" rx="10" fill="#ffffff"/>
  <rect x="60" y="200" width="160" height="56" rx="10" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
