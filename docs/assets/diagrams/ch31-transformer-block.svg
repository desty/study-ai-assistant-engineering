  <path d="M 530.0,284 L 530.0,302" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 530.0,366 L 530.0,384" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 640 170.0 L 670 170.0 L 670 296 L 636 296" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <rect x="684.0" y="202.0" width="72" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="720" y="215.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">residual</text>
  <path d="M 640 334.0 L 670 334.0 L 670 460 L 636 460" stroke="#059669" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <rect x="684.0" y="366.0" width="72" height="18" rx="4" fill="#ffffff" stroke="#e5e7eb" stroke-width="0.8"/>
  <text x="720" y="379.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#475569">residual</text>
  <rect x="920" y="200" width="160" height="56" rx="10" fill="#ffffff"/>
  <rect x="920" y="200" width="160" height="56" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="1000.0" y="224.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">LM Head (linear)</text>
  <text x="1000.0" y="240.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">hidden → vocab</text>
  <rect x="920" y="290" width="160" height="56" rx="10" fill="#ffffff"/>
  <rect x="920" y="290" width="160" height="56" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
