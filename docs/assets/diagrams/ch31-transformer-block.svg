  <rect x="420" y="140" width="220" height="60" rx="10" fill="#ffffff"/>
  <rect x="420" y="140" width="220" height="60" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="530.0" y="166.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">LayerNorm</text>
  <text x="530.0" y="182.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">안정화</text>
  <rect x="420" y="222" width="220" height="60" rx="10" fill="#ffffff"/>
  <rect x="420" y="222" width="220" height="60" rx="10" fill="#fef3e0" stroke="#ea580c" stroke-width="1.5"/>
  <text x="530.0" y="248.0" text-anchor="middle" font-size="14" font-weight="700" fill="#9a3412">Multi-Head Self-Attention</text>
  <text x="530.0" y="264.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#c2410c">토큰끼리 정보 교환</text>
  <rect x="420" y="304" width="220" height="60" rx="10" fill="#ffffff"/>
  <rect x="420" y="304" width="220" height="60" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="530.0" y="330.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">LayerNorm</text>
  <text x="530.0" y="346.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">안정화</text>
  <rect x="420" y="386" width="220" height="60" rx="10" fill="#ffffff"/>
  <rect x="420" y="386" width="220" height="60" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
