  <rect x="60" y="290" width="160" height="56" rx="10" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="140.0" y="314.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">+ Position (RoPE)</text>
  <text x="140.0" y="330.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">순서 정보 주입</text>
  <path d="M 140.0,168 L 140.0,198" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 140.0,258 L 140.0,288" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="320" y="90" width="540" height="380" rx="12" fill="rgba(124,58,237,0.04)" stroke="#7c3aed" stroke-width="1" stroke-dasharray="8,4"/>
