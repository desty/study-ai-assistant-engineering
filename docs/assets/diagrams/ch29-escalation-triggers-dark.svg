<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 540" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1200" height="540" fill="#020617"/>
  <rect width="1200" height="540" fill="url(#grid)"/>
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">휴먼 개입 — 두 가지 트리거</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">실패 임계 초과(자동) · 고위험 액션(사전 정책). 둘 다 같은 승인 큐로 흘러야 감사 추적이 한 곳에 모인다.</text>
  <rect x="60" y="110" width="230" height="100" rx="12" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="2"/>
  <text x="175.0" y="138" text-anchor="middle" font-size="14" font-weight="700" fill="#fecaca">① 실패 임계 초과</text>
  <text x="74" y="162" font-size="11" fill="#f87171">• retry 5회 실패</text>
  <text x="74" y="180" font-size="11" fill="#f87171">• guardrail escalate</text>
  <text x="74" y="198" font-size="11" fill="#f87171">• low confidence (&lt; 0.6)</text>
  <rect x="60" y="290" width="230" height="100" rx="12" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="175.0" y="318" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">② 고위험 액션</text>
  <text x="74" y="342" font-size="11" fill="#fbbf24">• 큰 금액 환불 (&gt; ₩100k)</text>
  <text x="74" y="360" font-size="11" fill="#fbbf24">• 비가역 (계정 삭제)</text>
  <text x="74" y="378" font-size="11" fill="#fbbf24">• 외부 메시지 (이메일)</text>
  <rect x="460" y="200" width="240" height="150" rx="14" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="2"/>
  <text x="580.0" y="230" text-anchor="middle" font-size="15" font-weight="700" fill="#fbcfe8">Approval Queue</text>
  <text x="580.0" y="252" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">pending · TTL · context</text>
  <rect x="480" y="270" width="200" height="18" rx="3" fill="#0f172a" stroke="#f472b6" stroke-width="0.8"/>
  <text x="490" y="283" font-size="10" font-family="JetBrains Mono, monospace" fill="#f472b6">case_1 · fail · 2m ago</text>
  <rect x="480" y="294" width="200" height="18" rx="3" fill="#0f172a" stroke="#f472b6" stroke-width="0.8"/>
  <text x="490" y="307" font-size="10" font-family="JetBrains Mono, monospace" fill="#f472b6">case_2 · risk · 2m ago</text>
  <rect x="480" y="318" width="200" height="18" rx="3" fill="#0f172a" stroke="#f472b6" stroke-width="0.8"/>
  <text x="490" y="331" font-size="10" font-family="JetBrains Mono, monospace" fill="#f472b6">case_3 · fail · 2m ago</text>
  <path d="M 292,160.0 L 458,250" stroke="#f87171" stroke-width="1.8" fill="none" marker-end="url(#arr-error)"/>
  <rect x="353.0" y="178.0" width="44" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="375.0" y="191.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">auto</text>
  <path d="M 292,340.0 L 458,300" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arr-gate)" stroke-dasharray="3,3"/>
  <rect x="346.0" y="293.0" width="58" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="375.0" y="306.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">policy</text>
  <rect x="870" y="110" width="220" height="100" rx="10" fill="#0f172a"/>
  <rect x="870" y="110" width="220" height="100" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <text x="980.0" y="156.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a5f3fc">Reviewer (Slack/Dashboard)</text>
  <text x="980.0" y="172.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">approve · reject · edit</text>
  <rect x="870" y="290" width="220" height="100" rx="12" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="980.0" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">Audit Log (immutable)</text>
  <text x="884" y="346" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">case_id · who · when</text>
  <text x="884" y="366" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">decision · diff · trace_id</text>
  <path d="M 702,240 L 868,160.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="756.0" y="173.0" width="58" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="785.0" y="186.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">notify</text>
  <path d="M 980.0,212 L 980.0,288" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <rect x="961.5" y="223.0" width="37" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="980.0" y="236.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">log</text>
  <path d="M 580.0 352 Q 680.0 420, 900 340.0" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <rect x="674.0" y="371" width="72" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="710.0" y="384" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">enqueued</text>
  <path d="M 880 212 C 880 270, 580.0 140, 580.0 198" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="729.5" y="241" width="121" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="790" y="254" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">resume / reject</text>
  <rect x="40" y="505" width="1120" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="600.0" y="521" text-anchor="middle" font-size="11" fill="#cbd5e1">①은 자동 트리거 · ②는 사전 정책. 모든 결정은 Audit Log 에 기록되어 사후 감사·법적 근거가 된다.</text>
</svg>