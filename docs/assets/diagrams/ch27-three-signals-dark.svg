<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 520" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1200" height="520" fill="#020617"/>
  <rect width="1200" height="520" fill="url(#grid)"/>
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">관측성의 3 신호 — Logs · Metrics · Traces</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">하나만 보면 장애의 1/3 만 보인다. 셋이 같은 trace_id 로 묶여야 디버깅이 한 번에 끝난다.</text>
  <rect x="80" y="110" width="320" height="270" rx="14" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="2"/>
  <text x="240.0" y="142" text-anchor="middle" font-size="18" font-weight="700" fill="#a7f3d0">Logs</text>
  <text x="240.0" y="164" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">structured · per event</text>
  <text x="240.0" y="190" text-anchor="middle" font-size="13" font-style="italic" fill="#34d399">"무슨 일이 일어났나"</text>
  <text x="104" y="224" font-size="12" fill="#34d399">• request 시작/끝</text>
  <text x="104" y="246" font-size="12" fill="#34d399">• 에러 stack trace</text>
  <text x="104" y="268" font-size="12" fill="#34d399">• 사용자 액션</text>
  <text x="104" y="290" font-size="12" fill="#34d399">• 가드레일 위반</text>
  <line x1="100" y1="330" x2="380" y2="330" stroke="#34d399" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="240.0" y="352" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a7f3d0">searchable · ELK · CloudWatch</text>
  <rect x="440" y="110" width="320" height="270" rx="14" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="2"/>
  <text x="600.0" y="142" text-anchor="middle" font-size="18" font-weight="700" fill="#fde68a">Metrics</text>
  <text x="600.0" y="164" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">aggregated · timeseries</text>
  <text x="600.0" y="190" text-anchor="middle" font-size="13" font-style="italic" fill="#fbbf24">"얼마나 자주 / 얼마나 빨리"</text>
  <text x="464" y="224" font-size="12" fill="#fbbf24">• p50/p95/p99 latency</text>
  <text x="464" y="246" font-size="12" fill="#fbbf24">• req/sec · error rate</text>
  <text x="464" y="268" font-size="12" fill="#fbbf24">• cost · token usage</text>
  <text x="464" y="290" font-size="12" fill="#fbbf24">• cache hit rate</text>
  <line x1="460" y1="330" x2="740" y2="330" stroke="#fbbf24" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="600.0" y="352" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fde68a">Prometheus · Datadog</text>
  <rect x="800" y="110" width="320" height="270" rx="14" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="2"/>
  <text x="960.0" y="142" text-anchor="middle" font-size="18" font-weight="700" fill="#fed7aa">Traces</text>
  <text x="960.0" y="164" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">causal · across spans</text>
  <text x="960.0" y="190" text-anchor="middle" font-size="13" font-style="italic" fill="#fb923c">"어디서 어디로 흘렀나"</text>
  <text x="824" y="224" font-size="12" fill="#fb923c">• span tree (Ch 27 §1)</text>
  <text x="824" y="246" font-size="12" fill="#fb923c">• cross-service 호출</text>
  <text x="824" y="268" font-size="12" fill="#fb923c">• prompt + response</text>
  <text x="824" y="290" font-size="12" fill="#fb923c">• cost per span</text>
  <line x1="820" y1="330" x2="1100" y2="330" stroke="#fb923c" stroke-width="0.8" stroke-dasharray="3,2"/>
  <text x="960.0" y="352" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fed7aa">LangSmith · Langfuse · OTel</text>
  <rect x="80" y="420" width="1040" height="60" rx="12" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="600.0" y="446" text-anchor="middle" font-size="14" font-weight="700" fill="#fbcfe8">공통 trace_id · user_id · request_id</text>
  <text x="600.0" y="466" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">셋을 묶는 키. 한 ID 로 검색하면 logs · metrics · traces 가 동시에 떨어져야 한다.</text>
  <path d="M 240.0,382 L 240.0,418" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <path d="M 600.0,382 L 600.0,418" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <path d="M 960.0,382 L 960.0,418" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
</svg>