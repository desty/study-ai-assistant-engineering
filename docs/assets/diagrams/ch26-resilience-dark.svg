<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 480" font-family="Pretendard, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1e293b" stroke-width="0.5"/>
    </pattern>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#64748b"/></marker>
    <marker id="arr-input" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#60a5fa"/></marker>
    <marker id="arr-llm" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fb923c"/></marker>
    <marker id="arr-model" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#a78bfa"/></marker>
    <marker id="arr-token" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-output" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#34d399"/></marker>
    <marker id="arr-gate" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#fbbf24"/></marker>
    <marker id="arr-tool" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#22d3ee"/></marker>
    <marker id="arr-memory" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f472b6"/></marker>
    <marker id="arr-error" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto"><polygon points="0,0 10,3.5 0,7" fill="#f87171"/></marker>
  </defs>
  <rect width="1200" height="480" fill="#020617"/>
  <rect width="1200" height="480" fill="url(#grid)"/>
  <text x="600" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">한 번의 LLM 호출이 살아남는 길</text>
  <text x="600" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">캐시 → 레이트리밋 → 재시도 → 서킷브레이커 → 폴백. 모든 단계가 빠지면 장애로 전이된다.</text>
  <rect x="165" y="130" width="150" height="110" rx="10" fill="#0f172a"/>
  <rect x="165" y="130" width="150" height="110" rx="10" fill="rgba(244,114,182,0.15)" stroke="#f472b6" stroke-width="1.5"/>
  <text x="240.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fbcfe8">① Cache</text>
  <text x="240.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f472b6">prompt hash</text>
  <text x="240.0" y="213.0" text-anchor="middle" font-size="10" fill="#f472b6">hit ⇒ 즉시 반환</text>
  <rect x="345" y="130" width="150" height="110" rx="10" fill="#0f172a"/>
  <rect x="345" y="130" width="150" height="110" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="420.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">② Rate Limit</text>
  <text x="420.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">token bucket</text>
  <text x="420.0" y="213.0" text-anchor="middle" font-size="10" fill="#fbbf24">초과 ⇒ 429 / queue</text>
  <rect x="525" y="130" width="150" height="110" rx="10" fill="#0f172a"/>
  <rect x="525" y="130" width="150" height="110" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="600.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fed7aa">③ LLM Call</text>
  <text x="600.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">provider API</text>
  <text x="600.0" y="213.0" text-anchor="middle" font-size="10" fill="#fb923c">timeout 30s</text>
  <rect x="705" y="130" width="150" height="110" rx="10" fill="#0f172a"/>
  <rect x="705" y="130" width="150" height="110" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
  <text x="780.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fecaca">④ Retry</text>
  <text x="780.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#f87171">exp · jitter</text>
  <text x="780.0" y="213.0" text-anchor="middle" font-size="10" fill="#f87171">5xx · 429 · timeout</text>
  <rect x="885" y="130" width="150" height="110" rx="10" fill="#0f172a"/>
  <rect x="885" y="130" width="150" height="110" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="960.0" y="181.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">⑤ Result</text>
  <text x="960.0" y="197.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">JSON · stream</text>
  <text x="960.0" y="213.0" text-anchor="middle" font-size="10" fill="#34d399">정상 응답</text>
  <path d="M 317,185.0 L 343,185.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 497,185.0 L 523,185.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 677,185.0 L 703,185.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 857,185.0 L 883,185.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="540" y="60" width="120" height="50" rx="10" fill="rgba(248,113,113,0.15)" stroke="#f87171" stroke-width="1.5"/>
  <text x="600" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="#fecaca">Circuit Breaker</text>
  <text x="600" y="100" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#f87171">5회 연속 실패 ⇒ open</text>
  <path d="M 600,112 L 600.0,128" stroke="#f87171" stroke-width="1.8" fill="none" marker-end="url(#arr-error)"/>
  <rect x="578.0" y="93.0" width="44" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="600.0" y="106.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">trip</text>
  <rect x="675" y="320" width="220" height="60" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="785.0" y="345" text-anchor="middle" font-size="13" font-weight="700" fill="#fde68a">Fallback</text>
  <text x="785.0" y="365" text-anchor="middle" font-size="10" font-family="JetBrains Mono, monospace" fill="#fbbf24">stale cache · 작은 모델 · 사람 이관</text>
  <path d="M 780.0,242 L 785.0,318" stroke="#fbbf24" stroke-width="1.5" fill="none" marker-end="url(#arr-gate)" stroke-dasharray="3,3"/>
  <rect x="743.0" y="253.0" width="79" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="782.5" y="266.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">exhausted</text>
  <path d="M 895 350 Q 875 350, 960.0 242" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-output)"/>
  <rect x="913.5" y="321" width="93" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="960.0" y="334" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">degraded ok</text>
  <rect x="40" y="445" width="1120" height="22" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="600.0" y="461" text-anchor="middle" font-size="11" fill="#cbd5e1">캐시·레이트리밋은 호출 전 · 재시도·브레이커는 호출 중 · 폴백은 호출 실패 후. 한 줄에서 다섯 정책이 다른 이유로 작동.</text>
</svg>