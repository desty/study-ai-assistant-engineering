  <path d="M 530.0,284 L 530.0,302" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 530.0,366 L 530.0,384" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 640 170.0 L 670 170.0 L 670 296 L 636 296" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <rect x="684.0" y="202.0" width="72" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="720" y="215.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">residual</text>
  <path d="M 640 334.0 L 670 334.0 L 670 460 L 636 460" stroke="#34d399" stroke-width="1.5" fill="none" marker-end="url(#arr-token)" stroke-dasharray="5,3"/>
  <rect x="684.0" y="366.0" width="72" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="720" y="379.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">residual</text>
  <rect x="920" y="200" width="160" height="56" rx="10" fill="#0f172a"/>
  <rect x="920" y="200" width="160" height="56" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="1000.0" y="224.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">LM Head (linear)</text>
  <text x="1000.0" y="240.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">hidden → vocab</text>
  <rect x="920" y="290" width="160" height="56" rx="10" fill="#0f172a"/>
  <rect x="920" y="290" width="160" height="56" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1000.0" y="314.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">Softmax</text>
  <text x="1000.0" y="330.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">다음 토큰 확률 분포</text>
  <rect x="920" y="380" width="160" height="56" rx="10" fill="#0f172a"/>
  <rect x="920" y="380" width="160" height="56" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <text x="1000.0" y="404.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">Sample / argmax</text>
  <text x="1000.0" y="420.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">다음 토큰 결정</text>
  <path d="M 1000.0,258 L 1000.0,288" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 1000.0,348 L 1000.0,378" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 222,318.0 L 324,280.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="244.0" y="272.0" width="58" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="273.0" y="285.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">hidden</text>
  <path d="M 862,280.0 L 918,228.0" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="861.0" y="227.0" width="58" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="890.0" y="240.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">hidden</text>
  <rect x="40" y="540" width="1100" height="44" rx="6" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="590.0" y="562" text-anchor="middle" font-size="12" fill="#cbd5e1">d_model · n_heads · n_layers · vocab_size 가 모델 크기를 결정. Llama-3-8B ≈ d=4096 · h=32 · L=32 · V=128k.</text>
  <text x="590.0" y="580" text-anchor="middle" font-size="11" fill="#cbd5e1">MoE 는 FFN 자리에 여러 expert 중 일부만 활성. attention 은 그대로.</text>
</svg>