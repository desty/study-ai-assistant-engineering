  <text x="140.0" y="240.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">dim = d_model</text>
  <rect x="60" y="290" width="160" height="56" rx="10" fill="#0f172a"/>
  <rect x="60" y="290" width="160" height="56" rx="10" fill="rgba(52,211,153,0.15)" stroke="#34d399" stroke-width="1.5"/>
  <text x="140.0" y="314.0" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">+ Position (RoPE)</text>
  <text x="140.0" y="330.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">순서 정보 주입</text>
