  <path d="M 140.0,258 L 140.0,288" stroke="#64748b" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="320" y="90" width="540" height="380" rx="12" fill="rgba(167,139,250,0.05)" stroke="#a78bfa" stroke-width="1" stroke-dasharray="8,4"/>
  <text x="332" y="108" font-size="10" font-weight="700" fill="#a78bfa" font-family="JetBrains Mono, monospace">TRANSFORMER BLOCK × N (e.g. N=32)</text>
  <rect x="420" y="140" width="220" height="60" rx="10" fill="#0f172a"/>
  <rect x="420" y="140" width="220" height="60" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="530.0" y="166.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">LayerNorm</text>
  <text x="530.0" y="182.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">안정화</text>
  <rect x="420" y="222" width="220" height="60" rx="10" fill="#0f172a"/>
  <rect x="420" y="222" width="220" height="60" rx="10" fill="rgba(251,146,60,0.15)" stroke="#fb923c" stroke-width="1.5"/>
  <text x="530.0" y="248.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fed7aa">Multi-Head Self-Attention</text>
  <text x="530.0" y="264.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fb923c">토큰끼리 정보 교환</text>
  <rect x="420" y="304" width="220" height="60" rx="10" fill="#0f172a"/>
  <rect x="420" y="304" width="220" height="60" rx="10" fill="rgba(251,191,36,0.15)" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="530.0" y="330.0" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">LayerNorm</text>
  <text x="530.0" y="346.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">안정화</text>
