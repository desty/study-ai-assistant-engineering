  <text x="630.0" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#bfdbfe">Fix</text>
  <text x="630.0" y="242" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#60a5fa">root cause 수정</text>
  <text x="630.0" y="256" text-anchor="middle" font-size="10" fill="#60a5fa">한 층만 · 측정 가능</text>
  <rect x="780" y="170" width="180" height="115" rx="10" fill="#0f172a"/>
  <rect x="780" y="170" width="180" height="115" rx="10" fill="rgba(52,211,153,0.2)" stroke="#34d399" stroke-width="1.5"/>
  <circle cx="870.0" cy="192" r="13" fill="#34d399"/>
  <text x="870.0" y="197" text-anchor="middle" font-size="13" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">4</text>
  <text x="870.0" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#a7f3d0">Verify</text>
  <text x="870.0" y="242" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#34d399">evalset 에 추가</text>
  <text x="870.0" y="256" text-anchor="middle" font-size="10" fill="#34d399">회귀 테스트 · 재현 보장</text>
