  <rect width="1000" height="380" fill="#020617"/>
  <rect width="1000" height="380" fill="url(#grid)"/>
  <text x="500" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#f1f5f9">Debug Loop — 실패 한 건에서 시작해 평가셋을 키운다</text>
  <text x="500" y="58" text-anchor="middle" font-size="12" fill="#94a3b8">한 건의 실패 → 분류 → 수정 → 평가셋 합류 → 다음 라운드 회귀 방지</text>
  <rect x="60" y="170" width="180" height="115" rx="10" fill="#0f172a"/>
  <rect x="60" y="170" width="180" height="115" rx="10" fill="rgba(34,211,238,0.15)" stroke="#22d3ee" stroke-width="1.5"/>
  <circle cx="150.0" cy="192" r="13" fill="#22d3ee"/>
  <text x="150.0" y="197" text-anchor="middle" font-size="13" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">1</text>
  <text x="150.0" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#a5f3fc">Trace</text>
  <text x="150.0" y="242" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#22d3ee">LangSmith /
Langfuse</text>
