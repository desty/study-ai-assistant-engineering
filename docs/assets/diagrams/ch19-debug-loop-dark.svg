  <rect x="394.0" y="360" width="212" height="18" rx="4" fill="#0f172a" stroke="#334155" stroke-width="0.8"/>
  <text x="500.0" y="373" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#94a3b8">다음 실패 트리거 시 같은 루프 반복 (영구 개선)</text>
