  <circle cx="390.0" cy="192" r="13" fill="#fbbf24"/>
  <text x="390.0" y="197" text-anchor="middle" font-size="13" font-weight="700" fill="#020617" font-family="JetBrains Mono, monospace">2</text>
  <text x="390.0" y="224" text-anchor="middle" font-size="14" font-weight="700" fill="#fde68a">Classify</text>
  <text x="390.0" y="242" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#fbbf24">5 택소노미</text>
  <text x="390.0" y="256" text-anchor="middle" font-size="10" fill="#fbbf24">prompt · retrieval · data
generation · tool</text>
