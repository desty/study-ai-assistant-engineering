  <rect width="1160" height="520" fill="#ffffff"/>
  <rect width="1160" height="520" fill="url(#grid)"/>
  <text x="580" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">LangGraph StateGraph — 고객 지원 flow 예제</text>
  <text x="580" y="58" text-anchor="middle" font-size="12" fill="#64748b">State 를 공유하는 node 와 edge. Conditional edge 로 분기.</text>
  <rect x="40" y="100" width="280" height="380" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="56" y="128" font-size="14" font-weight="700" fill="#500724" font-family="JetBrains Mono, monospace">class State(TypedDict):</text>
  <line x1="52" y1="140" x2="308" y2="140" stroke="#db2777" stroke-width="1"/>
  <text x="60" y="170" font-size="13" font-weight="700" fill="#500724" font-family="JetBrains Mono, monospace">messages: list[Msg]</text>
  <text x="72" y="188" font-size="11" fill="#be185d"># add_messages reducer</text>
  <text x="60" y="230" font-size="13" font-weight="700" fill="#500724" font-family="JetBrains Mono, monospace">intent: str</text>
  <text x="72" y="248" font-size="11" fill="#be185d"># faq / refund / bug</text>
  <text x="60" y="290" font-size="13" font-weight="700" fill="#500724" font-family="JetBrains Mono, monospace">order_id: str | None</text>
  <text x="72" y="308" font-size="11" fill="#be185d"># 분류 후 채워짐</text>
  <text x="60" y="350" font-size="13" font-weight="700" fill="#500724" font-family="JetBrains Mono, monospace">needs_human: bool</text>
  <text x="72" y="368" font-size="11" fill="#be185d"># interrupt 트리거</text>
  <text x="60" y="410" font-size="13" font-weight="700" fill="#500724" font-family="JetBrains Mono, monospace">response: str</text>
  <text x="72" y="428" font-size="11" fill="#be185d"># 최종 응답</text>
  <text x="56" y="464" font-size="10" font-family="JetBrains Mono, monospace" fill="#be185d">모든 node 가 공유 · 증분 업데이트</text>
