  <text x="520" y="36" text-anchor="middle" font-size="18" font-weight="700" fill="#0f172a">Offline vs Online 평가 — 배포 전과 후</text>
  <text x="520" y="58" text-anchor="middle" font-size="12" fill="#64748b">같은 지표라도 실험실 수치와 실사용 수치는 다르다. 둘 다 본다.</text>
