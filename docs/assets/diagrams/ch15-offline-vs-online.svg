  <text x="580" y="200" font-size="12" font-weight="700" font-family="JetBrains Mono, monospace" fill="#500724">데이터</text>
  <text x="640" y="200" font-size="12" fill="#be185d">실사용자 로그 · 피드백</text>
  <text x="580" y="250" font-size="12" font-weight="700" font-family="JetBrains Mono, monospace" fill="#500724">장점</text>
