  <path d="M 418,157 L 438,157" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 602,157 L 622,157" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <path d="M 786,157 L 806,157" stroke="#6b7280" stroke-width="1.8" fill="none" marker-end="url(#arr)"/>
  <rect x="72" y="100" width="160" height="115" rx="10" fill="#ffffff"/>
