  <text x="888.0" y="169.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">assistant</text>
  <text x="888.0" y="185.5" text-anchor="middle" font-size="10" fill="#047857">원하는 형식</text>
