  <rect x="624" y="100" width="160" height="115" rx="10" fill="#ffffff"/>
  <rect x="624" y="100" width="160" height="115" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="704.0" y="153.5" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">LLM</text>
  <text x="704.0" y="169.5" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">inference</text>
  <text x="704.0" y="185.5" text-anchor="middle" font-size="10" fill="#6d28d9">토큰 생성</text>
