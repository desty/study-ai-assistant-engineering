  <text x="110.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#0d47a1">요청</text>
  <text x="110.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#1e40af">user input</text>
  <rect x="220" y="190" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="220" y="190" width="140" height="90" rx="10" fill="#f3e8ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="290.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#4c1d95">LLM</text>
  <text x="290.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#6d28d9">JSON 생성</text>
  <rect x="420" y="190" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="420" y="190" width="140" height="90" rx="10" fill="#cffafe" stroke="#0891b2" stroke-width="1.5"/>
  <text x="490.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#083344">파싱</text>
  <text x="490.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#0e7490">json.loads</text>
  <rect x="620" y="190" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="620" y="190" width="140" height="90" rx="10" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="690.0" y="231.0" text-anchor="middle" font-size="14" font-weight="700" fill="#713f12">검증</text>
  <text x="690.0" y="247.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#a16207">Pydantic</text>
  <rect x="220" y="340" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="220" y="340" width="140" height="90" rx="10" fill="#d1fae5" stroke="#059669" stroke-width="1.5"/>
  <text x="290.0" y="381.0" text-anchor="middle" font-size="14" font-weight="700" fill="#064e3b">통과</text>
  <text x="290.0" y="397.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#047857">dict → 사용</text>
  <rect x="480" y="340" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="480" y="340" width="140" height="90" rx="10" fill="#fce7f3" stroke="#db2777" stroke-width="1.5"/>
  <text x="550.0" y="381.0" text-anchor="middle" font-size="14" font-weight="700" fill="#500724">재시도</text>
  <text x="550.0" y="397.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#be185d">with error ctx</text>
  <rect x="740" y="340" width="140" height="90" rx="10" fill="#ffffff"/>
  <rect x="740" y="340" width="140" height="90" rx="10" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="810.0" y="381.0" text-anchor="middle" font-size="14" font-weight="700" fill="#7f1d1d">Fallback</text>
  <text x="810.0" y="397.0" text-anchor="middle" font-size="11" font-family="JetBrains Mono, monospace" fill="#b91c1c">규칙/기본값</text>
