name: Link Check

on:
  schedule:
    # 매주 월요일 03:00 UTC (= KST 12:00)
    - cron: "0 3 * * 1"
  workflow_dispatch:

jobs:
  lychee:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Run lychee
        uses: lycheeverse/lychee-action@v2
        with:
          # docs/ 본문과 README 의 외부 링크만 검사. _research/ 는 사적 보관용이라 제외.
          args: >-
            --no-progress
            --max-concurrency 8
            --timeout 20
            --retry-wait-time 5
            --max-retries 2
            --accept 200,206,429
            --exclude-mail
            --exclude '127\.0\.0\.1'
            --exclude 'localhost'
            'docs/**/*.md'
            'README.md'
          fail: false
          output: ./lychee-report.md

      - name: Create issue on failure
        if: env.lychee_exit_code != '0'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Link rot detected (weekly check)"
          content-filepath: ./lychee-report.md
          labels: "link-rot,automated"
